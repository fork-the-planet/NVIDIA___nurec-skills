# Download a pre-trained NuRec USDZ from HuggingFace, render the clip from
# its training trajectory, and convert the resulting frames to an MP4.
#
# General-purpose single-clip render. Flat OSMO cloud workflow — no
# includes, all tasks inline.
#
# Credentials (register once before first run):
#   export NGC_API_KEY=nvapi-...
#   osmo credential set hf-token    --type GENERIC  --payload token=hf_YOUR_TOKEN_HERE
#   osmo credential set nvcr        --type REGISTRY --payload registry=nvcr.io username=\$oauthtoken auth=$NGC_API_KEY
#
# DAG:
#   download-from-hf ──→ render-usdz ──→ convert-to-video
#
# Only one GPU-bound task (`render-usdz`), so this workflow runs cleanly on
# a 1-GPU pool (orion-cluster-azure default `gpu_min=1`) without any
# `depends_on:` serialization tricks.

default-values:
  hf_dataset: "nvidia/PhysicalAI-Autonomous-Vehicles-NuRec"
  release: "26.02_release"
  # UUID must exist under sample_set/<release>/ in $hf_dataset; override
  # via workflow params for any other clip.
  clip_id: "048b974e-1546-488a-b8f9-d32bff77f5aa"
  camera_to_render: "camera_front_wide_120fov"
  # nre/nre:latest is deprecated; nre-ga is the public NGC home of the GA build.
  nre_image: "nvcr.io/nvidia/nre/nre-ga:latest"
  nre_entrypoint: /app/internal/scripts/pycena/runtime/pycena_run
  shm_size: 64g
  render_height: "1024"
  video_framerate: "24"
  # Rig offsets default to 0 (renders the original training trajectory).
  # Override via workflow params to render a novel view.
  novel_view_translation_offset: "0.0 0.0 0.0"
  novel_view_rotation_offset: "0.0 0.0 0.0"

workflow:
  name: render-usdz
  # Each named resource set declares a `platform:` so OSMO routes the
  # pod to the matching POOL platform and merges the right
  # `override_pod_template`. `default` → `system` (CPU-only nodes,
  # picks up `default_ctrl` + `default_user`); `gpu` → `gpu`
  # (`default_ctrl` + `default_user` + `gpu_toleration` + `gpu_user` —
  # which is what makes `resource: gpu` actually attach a GPU). A task
  # with no `resource:` falls back to `default` → system.
  #
  # Sizing notes (AKS D8ds_v5 system pool, ~7 vCPU / ~31Gi RAM /
  # ~46.6Gi ephemeral allocatable):
  #   default.cpu     = 2     (4 leaves no headroom for system daemons)
  #   default.memory  = 8Gi   (32Gi fails admission on D-family)
  #   default.storage = 20Gi  (94Gi fails admission; download is <500MB)
  # GPU set is unchanged — H100 nodes have plenty of room.
  resources:
    default:
      cpu: 2
      memory: 8Gi
      storage: 20Gi
      platform: system
    gpu:
      cpu: 4
      memory: 48Gi
      gpu: 1
      storage: 94Gi
      platform: gpu
  tasks:
  # =====================================================================
  #  Phase 1 — download USDZ from HuggingFace
  # =====================================================================
  - name: download-from-hf
    image: ubuntu:24.04
    credentials:
      hf-token: /tmp/hf
    command: [bash, -c]
    args:
    - |
      set -euo pipefail
      apt-get update && apt-get install -y curl

      HF_TOKEN=$(cat /tmp/hf/token)

      CLIP_PATH="sample_set/{{release}}/{{clip_id}}"
      FILE_URL="https://huggingface.co/datasets/{{hf_dataset}}/resolve/main/${CLIP_PATH}/{{clip_id}}.usdz"

      mkdir -p {{output}}/usdz

      echo "=== Downloading {{clip_id}}.usdz directly from HuggingFace ==="
      HTTP_CODE=$(curl -fSL -w '%{http_code}' \
        -H "Authorization: Bearer ${HF_TOKEN}" \
        -o {{output}}/usdz/{{clip_id}}.usdz \
        "$FILE_URL" || true)

      if [ ! -f {{output}}/usdz/{{clip_id}}.usdz ] || [ "$HTTP_CODE" -ge 400 ] 2>/dev/null; then
        echo "ERROR: Failed to download USDZ (HTTP $HTTP_CODE)"
        echo "  URL: $FILE_URL"
        echo ""
        echo "Check that clip_id '{{clip_id}}' and release '{{release}}' are correct."
        exit 1
      fi

      echo ""
      echo "=== Downloaded USDZ ==="
      ls -lh {{output}}/usdz/
    outputs:
    - url: s3://osmo-workflows/{{workflow_id}}/outputs/download-from-hf

  # =====================================================================
  #  Phase 2 — render the clip (training trajectory)
  # =====================================================================
  - name: render-usdz
    image: '{{nre_image}}'
    inputs:
    - task: download-from-hf
    command: [bash, -c]
    args:
    - |
      set -euo pipefail

      # Per the NRE 26.04+ render CLI: --replicate-training-views (default ON)
      # locks per-frame ISP / camera intrinsics to the training rig and so MUST
      # be turned off whenever rig offsets, custom rig trajectories, actor
      # editing, or rolling-shutter overrides are applied. We detect non-zero
      # offsets and switch to --no-replicate-training-views automatically.
      TRANSL="{{novel_view_translation_offset}}"
      ROT="{{novel_view_rotation_offset}}"

      RENDER_ARGS=(
        render
        --artifact-path={{input:0}}/usdz/{{clip_id}}.usdz
        --output-dir={{output}}
        --image-format=png
        --camera-id={{camera_to_render}}
        --height={{render_height}}
        --frame-step=1
        --frame-naming=frame-end-timestamp
      )

      IS_NOVEL_VIEW=0
      for v in $TRANSL $ROT; do
        if awk -v v="$v" 'BEGIN { exit !(v+0 != 0) }'; then
          IS_NOVEL_VIEW=1
          break
        fi
      done

      if [ "$IS_NOVEL_VIEW" -eq 1 ]; then
        echo "Novel-view rig offsets detected; disabling --replicate-training-views."
        RENDER_ARGS+=(
          --no-replicate-training-views
          --rig-translation-offset $TRANSL
          --rig-rotation-offset $ROT
        )
      else
        echo "Zero rig offsets; keeping --replicate-training-views for faithful playback."
        RENDER_ARGS+=(--replicate-training-views)
      fi

      echo "Running: {{nre_entrypoint}} ${RENDER_ARGS[*]}"
      {{nre_entrypoint}} "${RENDER_ARGS[@]}"
    environment:
      SHM_SIZE: '{{shm_size}}'
    resource: gpu
    outputs:
    - url: s3://osmo-workflows/{{workflow_id}}/outputs/render-usdz

  # =====================================================================
  #  Phase 3 — convert frames to video
  # =====================================================================
  - name: convert-to-video
    image: ubuntu:24.04
    inputs:
    - task: render-usdz
    command: [bash, -c]
    args:
    - |
      set -euo pipefail
      apt-get update && apt-get install -y ffmpeg

      make_video() {
        local src_dir="$1"
        local out_file="$2"
        local label="$3"

        if [ ! -d "$src_dir" ]; then
          echo "  SKIP ($label): directory not found: $src_dir"
          return 0
        fi

        local frame_count
        frame_count=$(find "$src_dir" -maxdepth 1 \( -name '*.png' -o -name '*.jpg' \) | wc -l)
        if [ "$frame_count" -eq 0 ]; then
          echo "  SKIP ($label): no frames in $src_dir"
          return 0
        fi

        echo "  $label: $frame_count frames -> $out_file"

        local ext
        if ls "$src_dir"/*.png 1>/dev/null 2>&1; then
          ext="png"
        else
          ext="jpg"
        fi

        ffmpeg -y -framerate {{video_framerate}} \
          -pattern_type glob -i "$src_dir/*.$ext" \
          -c:v libx264 -pix_fmt yuv420p -crf 18 \
          "$out_file"
      }

      echo "=== Converting render frames to video ==="
      RENDER_SRC="{{input:0}}/{{camera_to_render}}"
      if [ ! -d "$RENDER_SRC" ]; then
        RENDER_SRC="{{input:0}}"
      fi
      make_video "$RENDER_SRC" "{{output}}/render.mp4" "Render"

      echo ""
      echo "=== Video created ==="
      ls -lh {{output}}/ 2>/dev/null || echo "(none)"
    outputs:
    - url: s3://osmo-workflows/{{workflow_id}}/outputs/convert-to-video
