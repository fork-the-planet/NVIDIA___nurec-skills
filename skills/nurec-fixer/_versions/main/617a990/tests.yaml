schema_version: 1
slug: nurec-fixer
items:
- id: nurec-fixer.001
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: |
    I have a directory of PNG frames rendered from a NuRec reconstruction
    and I want to run NVIDIA's current harmonizer on them. What container
    image do I use, and where do I get the pretrained weights?
  timeout_seconds: 90
  expected_signals:
  - DiffusionHarmonizer
  - nvcr.io/nvidia/cosmos/cosmos-predict2-container:1.2
  - nvidia/DiffusionHarmonizer
  - pretrained_harmonizer.pkl
  expected_signals_any:
  - HF_TOKEN
  - hf download
  forbidden_signals:
  - gitlab-master.nvidia.com
  - inference_jit_harmonizer.py
  - harmonizer_temporal.pt
  - nvcr.io/nvidia/pytorch:24.10-py3
  judge_rubric:
  - The response names DiffusionHarmonizer as the current standalone flow.
  - The response fetches pretrained weights from Hugging Face, not the old NGC JIT artifact.
  - The response uses a pinned Cosmos Predict2 container rather than :latest.
- id: nurec-fixer.002
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: |
    Walk me through the end-to-end workflow for running DiffusionHarmonizer
    on rendered frames, starting from a clean host.
  timeout_seconds: 150
  expected_signals:
  - validate_setup.py
  - git clone https://github.com/NVIDIA/harmonizer.git
  - hf download nvidia/DiffusionHarmonizer
  - docker run
  - inference_pretrained_model.py
  expected_ordering:
  - validate_setup.py
  - git clone
  - hf download
  - docker run
  forbidden_signals:
  - gitlab-master.nvidia.com
  - nvidia/nre/nurec-fixer:cosmos_3dgut_fixer_harmonizer
  judge_rubric:
  - The workflow validates prerequisites before running the model.
  - The workflow clones public code, downloads HF weights, then runs inference in Docker.
  - The response does not leak internal source repos.
- id: nurec-fixer.003
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: |
    Give me the exact docker command to process /data/renders into
    /data/enhanced using a harmonizer checkout at /opt/harmonizer.
  timeout_seconds: 120
  expected_signals:
  - docker run
  - --gpus
  - $(id -u):$(id -g)
  - /opt/harmonizer
  - /data/renders
  - /data/enhanced
  - inference_pretrained_model.py
  - pretrained_harmonizer.pkl
  expected_signals_any:
  - --timestep 250
  - --timestep=250
  forbidden_signals:
  - torchrun
  - --nproc_per_node
  - inference_jit_harmonizer.py
  judge_rubric:
  - The command mounts the code/model checkout and both input/output directories.
  - The command pins the container user to the host UID/GID.
  - The command uses the current pretrained inference script, not the old JIT script.
- id: nurec-fixer.004
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: |
    How do I download the pretrained DiffusionHarmonizer model safely?
  timeout_seconds: 90
  expected_signals:
  - HF_TOKEN
  - hf auth login
  - hf download nvidia/DiffusionHarmonizer
  - models/pretrained/pretrained_harmonizer.pkl
  forbidden_signals:
  - NGC_API_KEY
  - ngc registry model download-version
  judge_rubric:
  - The response uses Hugging Face credentials for model download.
  - The response does not echo the token value.
  - The response identifies the expected checkpoint path.
- id: nurec-fixer.005
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: |
    What GPUs are supported for running the current harmonizer, and what
    resolution is the public model card built around?
  timeout_seconds: 60
  expected_signals:
  - Ampere
  - Hopper
  - Blackwell
  - 576x1024
  expected_signals_any:
  - compute capability
  - '8.0'
  - sm_80
  forbidden_signals:
  - Turing
  - Volta
  judge_rubric:
  - The response says Ampere or newer is required/recommended.
  - The response mentions the model-card resolution around 576x1024.
- id: nurec-fixer.006
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: |
    How do I prepare a paired test dataset and run PSNR/LPIPS evaluation?
  timeout_seconds: 120
  expected_signals:
  - render
  - gt
  - evaluate_test_dataset.py
  - metrics.yaml
  expected_signals_any:
  - PSNR
  - LPIPS
  forbidden_signals:
  - gitlab-master.nvidia.com
  judge_rubric:
  - The response describes the per-scene render/ and gt/ layout with matching filenames.
  - The response invokes evaluate_test_dataset.py in the harmonizer container.
  - The response mentions metrics.yaml and enhanced evaluation outputs.
- id: nurec-fixer.007
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: |
    I want to fine-tune DiffusionHarmonizer on my own paired data. What JSON
    structure and training command should I start from?
  timeout_seconds: 180
  expected_signals:
  - train
  - test
  - image
  - target_image
  - train_pix2pix_turbo_harmonizer.py
  - --pretrained_path
  expected_signals_any:
  - --fixing_data_weight 3
  - lambda_lpips
  forbidden_signals:
  - inference_jit_harmonizer.py
  judge_rubric:
  - The response gives the train/test JSON manifest shape.
  - The response starts from the release README training flags.
  - The response explains how to fine-tune from pretrained_harmonizer.pkl.
- id: nurec-fixer.008
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: |
    My frames are named frame_1.png through frame_10.png. Is that safe?
  timeout_seconds: 60
  expected_signals_any:
  - zero-padded
  - zero padded
  - fixed-width
  - string sort
  forbidden_signals:
  - natural-sort guarantees correctness
  judge_rubric:
  - The response warns that the current standard inference helper sorts strings.
  - The response recommends fixed-width zero-padded frame names.
- id: nurec-fixer.009
  category: cross-tool
  tools_required:
  - nurec-fixer
  - nre
  user_prompt: |
    I'm already using NRE's --enable-difix flag. Is that the same as the
    standalone DiffusionHarmonizer workflow?
  timeout_seconds: 90
  expected_signals:
  - --enable-difix
  - nre
  - DiffusionHarmonizer
  expected_signals_any:
  - separate
  - standalone
  - do not mix
  forbidden_signals:
  - same weights guaranteed
  judge_rubric:
  - The response distinguishes NRE inline difix from standalone DiffusionHarmonizer.
  - The response directs inline rendering questions to the nre skill.
- id: nurec-fixer.010
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: |
    I finished running DiffusionHarmonizer. What should I clean up to reclaim disk?
  timeout_seconds: 120
  expected_signals:
  - docker image
  - harmonizer-cosmos-env
  - Hugging Face
  - models
  - outputs
  expected_signals_any:
  - docker builder prune
  - hf cache
  forbidden_signals:
  - nurec-fixer_vcosmos_3dgut_fixer_harmonizer
  judge_rubric:
  - The response covers Docker images/build cache, code checkout, HF model/dataset caches, and outputs.
  - The response warns not to revoke tokens as routine cleanup.
- id: nurec-fixer.011
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: |
    How should I check that HF_TOKEN is set before running the workflow?
    Give me a safe bash one-liner.
  timeout_seconds: 60
  expected_signals:
  - HF_TOKEN
  expected_signals_any:
  - ${#HF_TOKEN}
  - test -n
  forbidden_signals:
  - ${HF_TOKEN:-no}
  - ${HF_TOKEN:+yes}${HF_TOKEN
  judge_rubric:
  - The response recommends validate_setup.py or a presence/length-only shell check.
  - The response never prints the token value.
