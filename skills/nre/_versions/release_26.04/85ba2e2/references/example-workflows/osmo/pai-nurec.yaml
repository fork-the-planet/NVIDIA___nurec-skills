# PAI → NCore → NuRec — flat OSMO cloud workflow.
#
# Streams a PAI clip from Hugging Face, converts to NCore V4, then runs the
# full NuRec pipeline: manifest, aux data, training, and USDZ export.
#
# Reference: https://nvidia.github.io/ncore/conversions/pai/pai.html
#
# Credentials (register once before first run):
#   export NGC_API_KEY=nvapi-...
#   osmo credential set hf-token       --type GENERIC  --payload token=hf_YOUR_TOKEN_HERE
#   osmo credential set ngc-api-key    --type GENERIC  --payload key=$NGC_API_KEY
#   osmo credential set nvcr           --type REGISTRY --payload registry=nvcr.io username=\$oauthtoken auth=$NGC_API_KEY
#
# DAG:
#   convert-pai-to-ncore ──────────────────────────────────────────────┐
#   prepare-nre-config ───────────────────────────────────────────┐   │
#                                                                 │   │
#              generate-dataset-manifest (ncore) ─────────────────┤   │
#              generate-aux-data (ncore) ─────────────────────────┤   │
#                                                                 ↓   ↓
#                                           training ── export-usdz-artifact

default-values:
  # NCore build & conversion
  ncore_repo: https://github.com/nvidia/ncore.git
  ncore_ref: main
  clip_id: "25cd4769-5dcf-4b53-a351-bf2c5deb6124"
  camera_ids: "camera_front_wide_120fov camera_cross_left_120fov camera_cross_right_120fov camera_front_tele_30fov"
  # PAI Hyperion lidar id in NCore v4 (car2sim_6cam expects lidar_gt_top_p128 instead)
  lidar_ids: "lidar_top_360fov"
  no_lidars: "false"
  seek_sec: ""
  duration_sec: ""
  store_type: itar
  profile: separate-sensors

  # NRE / NuRec — nre/nre is deprecated; nre-ga is the GA build's public NGC home.
  nre_image: "nvcr.io/nvidia/nre/nre-ga:latest"
  nre_tools_image: "nvcr.io/nvidia/nre/nre-tools:latest"
  nre_entrypoint: /app/internal/scripts/pycena/runtime/pycena_run
  nre_config_dir: /app/internal/scripts/pycena/runtime/pycena_run.runfiles/_main/configs
  export_usdz_type: both
  run_id: latest
  # PyTorch multiprocessing uses /dev/shm; tiny default shm causes ENOSPC / bus errors.
  # Cloud OSMO: the pool's pod template must merge a `shared_memory` fragment
  # (emptyDir medium: Memory + volumeMount mountPath: /dev/shm). Inspect with
  # `kubectl get cm osmo-service-configs -n osmo-minimal -o yaml`; patch with
  # `kubectl patch cm osmo-service-configs -n osmo-minimal --type=merge -p ...`.
  # Tasks use bash -c, so SHM_SIZE + remount in scripts supplements image entrypoint behavior.
  shm_size: 64g

workflow:
  name: pai-nurec
  resources:
    default:
      cpu: 4
      memory: 32Gi
      storage: 94Gi
    gpu:
      cpu: 4
      memory: 64Gi
      gpu: 1
      storage: 94Gi
  tasks:
  # =====================================================================
  #  Phase 1 — parallel bootstrap
  # =====================================================================
  - name: convert-pai-to-ncore
    image: python:3.10
    credentials:
      hf-token: /tmp/hf
    command: [bash, -c]
    args:
    - |
      set -euo pipefail

      apt-get update && apt-get install -y --no-install-recommends curl git sudo

      curl -fSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
        -o /usr/local/bin/bazel
      chmod +x /usr/local/bin/bazel

      useradd -m builder
      git clone --depth 1 --branch {{ncore_ref}} {{ncore_repo}} /home/builder/ncore
      chown -R builder:builder /home/builder/ncore

      sudo -u builder bash -c '
        set -euo pipefail
        cd /home/builder/ncore
        bazel build //tools/data_converter/pai:convert
      '

      CONVERT="/home/builder/ncore/bazel-bin/tools/data_converter/pai/convert"
      HF_TOKEN=$(cat /tmp/hf/token)

      BASE_ARGS=("$CONVERT" --output-dir {{output}})

      CAMERA_IDS="{{camera_ids}}"
      if [ -n "$CAMERA_IDS" ]; then
        for cam in $CAMERA_IDS; do BASE_ARGS+=(--camera-id "$cam"); done
      fi

      if [ "{{no_lidars}}" = "true" ]; then
        BASE_ARGS+=(--no-lidars)
      fi

      SUB_ARGS=(pai-stream-v4 --hf-token "$HF_TOKEN" --sequence-meta)

      CLIP_ID="{{clip_id}}"
      if [ -z "$CLIP_ID" ]; then
        echo "No clip_id provided — listing available clips from the dataset index..."
        pip install --quiet pyarrow huggingface_hub
        python3 - "$HF_TOKEN" <<'PYSCRIPT'
      import sys
      from huggingface_hub import hf_hub_download
      import pyarrow.parquet as pq

      token = sys.argv[1]
      path = hf_hub_download(
          repo_id="nvidia/PhysicalAI-Autonomous-Vehicles",
          repo_type="dataset",
          filename="clip_index.parquet",
          token=token,
      )
      table = pq.read_table(path)
      cols = table.column_names
      print(f"Clip index: {table.num_rows} clips, columns: {cols}")
      id_col = "clip_id" if "clip_id" in cols else cols[0]
      clip_ids = table.column(id_col).to_pylist()
      print(f"\nFirst 20 clip IDs (column '{id_col}'):")
      for cid in clip_ids[:20]:
          print(f"  {cid}")
      PYSCRIPT
        echo ""
        echo "Re-run with a valid clip_id, e.g.:"
        echo "  clip_id=<one-of-the-above>"
        exit 1
      fi
      SUB_ARGS+=(--clip-id "$CLIP_ID")

      SEEK="{{seek_sec}}"
      if [ -n "$SEEK" ]; then SUB_ARGS+=(--seek-sec "$SEEK"); fi

      DURATION="{{duration_sec}}"
      if [ -n "$DURATION" ]; then SUB_ARGS+=(--duration-sec "$DURATION"); fi

      SUB_ARGS+=(--store-type "{{store_type}}")
      SUB_ARGS+=(--profile "{{profile}}")

      CMD=("${BASE_ARGS[@]}" "${SUB_ARGS[@]}")

      echo "Running: ${CMD[*]}"
      "${CMD[@]}"

      echo "Conversion complete. Output:"
      find {{output}} -type f | head -30
    outputs:
    - dataset:
        name: pai-ncore-data

  - name: prepare-nre-config
    image: alpine:latest
    command: [sh, -c]
    args:
    - |
      cat > {{output}}/external_overrides.yaml << 'ENDCONFIG'
      defaults:
        - /apps/prod/Hyperion-8.1/car2sim_6cam.yaml
        - _self_

      dataset:
        n_samples_per_epoch: 30000

      trainer:
        max_epochs: 1

      system:
        gaussians:
          metrics:
            cpsnr:
              enabled: true
              classes: null
            ssim:
              enabled: true
            lpips:
              enabled: true

      checkpoint:
        artifact:
          enabled: true
          checkpoint:
            enabled: true
          nrend:
            enabled: true
          parsed_config:
            enabled: true
          rig_trajectories:
            enabled: true
          sequence_tracks:
            enabled: true
      ENDCONFIG
    outputs:
    - dataset:
        name: nre-config

  # =====================================================================
  #  Phase 2 — dataset preparation (parallel, depend on convert)
  #  The converter writes the sequence metadata JSON (--sequence-meta is
  #  on by default) so generate-dataset-manifest just copies it out for
  #  the training step.
  # =====================================================================
  - name: generate-dataset-manifest
    image: alpine:latest
    inputs:
    - task: convert-pai-to-ncore
    command: [sh, -c]
    args:
    - |
      set -euo pipefail
      NCORE_NAME="pai_{{clip_id}}"
      echo "Looking for manifest in {{input:0}}/$NCORE_NAME/"
      ls -la {{input:0}}/$NCORE_NAME/

      MANIFEST=$(find {{input:0}}/$NCORE_NAME -name '*.json' | head -1)
      if [ -z "$MANIFEST" ]; then
        echo "ERROR: No JSON manifest found in converter output."
        echo "Files present:"
        find {{input:0}}/$NCORE_NAME -type f
        exit 1
      fi

      echo "Found manifest: $MANIFEST"
      cp "$MANIFEST" {{output}}/
      ls -lh {{output}}/
    outputs:
    - dataset:
        name: dataset-manifest

  - name: generate-aux-data
    image: '{{nre_tools_image}}'
    inputs:
    - task: convert-pai-to-ncore
    command: [bash, -c]
    args:
    - |
      set -euo pipefail
      NCORE_NAME="pai_{{clip_id}}"
      NCORE_DIR="/data/ncore/$NCORE_NAME"
      mkdir -p "$NCORE_DIR"
      ln -sf {{input:0}}/$NCORE_NAME/* "$NCORE_DIR/"

      # The nre-tools image entrypoint is a click group whose default subcommand
      # is `ncore-aux-data`; pass the subcommand explicitly so we don't rely on
      # the default-group fallback (matches nurec-workflows' nurec-steps.yaml).
      /app/internal/scripts/pycena/runtime/pycena_nre_tools \
        ncore-aux-data \
        --dataset-path="$NCORE_DIR/$NCORE_NAME.json" \
        --output-dir={{output}} \
        --store-meta \
        --no-seg-logits \
        --lidar-seg-camvis \
        --num-threads=auto
    environment:
      SHM_SIZE: '{{shm_size}}'
    resource: gpu
    outputs:
    - dataset:
        name: aux-data

  # =====================================================================
  #  Phase 3 — training
  # =====================================================================
  - name: training
    image: '{{nre_image}}'
    inputs:
    - task: convert-pai-to-ncore
    - task: generate-dataset-manifest
    - task: generate-aux-data
    - task: prepare-nre-config
    command: [bash, -c]
    args:
    - |
      set -euo pipefail
      NCORE_NAME="pai_{{clip_id}}"
      NCORE_DIR="/data/ncore/$NCORE_NAME"
      mkdir -p "$NCORE_DIR"

      for f in {{input:0}}/$NCORE_NAME/*; do ln -sf "$f" "$NCORE_DIR/"; done
      cp {{input:1}}/* "$NCORE_DIR/" 2>/dev/null || true
      for f in {{input:2}}/*; do ln -sf "$f" "$NCORE_DIR/"; done

      cp {{input:3}}/external_overrides.yaml {{nre_config_dir}}/external_overrides.yaml

      # car2sim_6cam.yaml targets CARLA/sim sensor names; PAI NCore uses real Hyperion ids.
      HYDRA_CAMERA_IDS="[$(echo '{{camera_ids}}' | tr ' ' ',')]"
      if [ "{{no_lidars}}" = "true" ]; then
        HYDRA_LIDAR_IDS="[]"
      else
        HYDRA_LIDAR_IDS="[$(echo '{{lidar_ids}}' | tr ' ' ',')]"
      fi

      # trainer.world_size / trainer.num_nodes default to 1 but are pinned here so
      # the NRE app doesn't fall into SLURM auto-detect on a multi-GPU OSMO pool
      # (matches internal/sqa/scripts/nre_image_trainval.sh defaults).
      {{nre_entrypoint}} \
        --config-name=external_overrides \
        mode=trainval \
        dataset.path="$NCORE_DIR/$NCORE_NAME.json" \
        "dataset.camera_ids=$HYDRA_CAMERA_IDS" \
        "dataset.lidar_ids=$HYDRA_LIDAR_IDS" \
        "checkpoint.artifact.mesh.generic.camera_ids=$HYDRA_CAMERA_IDS" \
        out_dir={{output}} \
        logger=tensorboard \
        logger.run_id={{run_id}} \
        trainer.world_size=1 \
        trainer.num_nodes=1
    environment:
      HYDRA_FULL_ERROR: '1'
      SHM_SIZE: '{{shm_size}}'
    resource: gpu
    outputs:
    - dataset:
        name: training-output

  # =====================================================================
  #  Phase 4 — USDZ export
  # =====================================================================
  - name: export-usdz-artifact
    image: '{{nre_image}}'
    inputs:
    - task: convert-pai-to-ncore
    - task: generate-dataset-manifest
    - task: generate-aux-data
    - task: training
    command: [bash, -c]
    args:
    - |
      set -euo pipefail
      NCORE_NAME="pai_{{clip_id}}"
      NCORE_DIR="/data/ncore/$NCORE_NAME"
      mkdir -p "$NCORE_DIR"
      for f in {{input:0}}/$NCORE_NAME/*; do ln -sf "$f" "$NCORE_DIR/"; done
      cp {{input:1}}/* "$NCORE_DIR/" 2>/dev/null || true
      for f in {{input:2}}/*; do ln -sf "$f" "$NCORE_DIR/"; done

      TRAIN={{input:3}}
      mkdir -p {{output}}/{{run_id}}/usd_out

      if [ "{{export_usdz_type}}" = "standard" ] || [ "{{export_usdz_type}}" = "both" ]; then
        echo "Exporting volume-based USDZ (standard)..."
        {{nre_entrypoint}} export-usdz-artifact \
          --config-name=$TRAIN/{{run_id}}/config/parsed.yaml \
          --checkpoint-name=$TRAIN/{{run_id}}/checkpoints/last.ckpt \
          --output-dir={{output}}/{{run_id}}/usd_out
        mv {{output}}/{{run_id}}/usd_out/last.usdz {{output}}/{{run_id}}/usd_out/volume_raw.usdz
      fi

      if [ "{{export_usdz_type}}" = "geompoints" ] || [ "{{export_usdz_type}}" = "both" ]; then
        echo "Exporting GeomPoints USDZ..."
        mkdir -p {{output}}/{{run_id}}/config {{output}}/{{run_id}}/checkpoints
        cp $TRAIN/{{run_id}}/config/parsed.yaml {{output}}/{{run_id}}/config/parsed.yaml
        cp $TRAIN/{{run_id}}/checkpoints/last.ckpt {{output}}/{{run_id}}/checkpoints/last.ckpt
        # The CLI auto-loads <ckpt_dir>/last.ckpt (no --checkpoint-name flag).
        # NRE 26.04+ defaults --usd-schema to `lightfield`; pin to `geompoints`
        # explicitly so the "particle" output keeps UsdGeom.Points semantics.
        {{nre_entrypoint}} export-gaussian-usd-asset \
          --config-name={{output}}/{{run_id}}/config/parsed.yaml \
          --usd-schema=geompoints
        mv {{output}}/{{run_id}}/usd_asset/$NCORE_NAME.usdz {{output}}/{{run_id}}/usd_out/particle_raw.usdz
      fi

      echo "USDZ export complete:"
      ls -lh {{output}}/{{run_id}}/usd_out/
    environment:
      SHM_SIZE: '{{shm_size}}'
    resource: gpu
    outputs:
    - dataset:
        name: usdz-artifacts
