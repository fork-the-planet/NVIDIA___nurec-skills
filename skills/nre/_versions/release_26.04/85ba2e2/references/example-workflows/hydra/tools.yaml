# ---------------------------------------------------------------------------
set_locale_to_utf8:
  name: set_locale_to_utf8
  command: bash
  args:
    - -c
    - |
      locale  # check for UTF-8
      sudo apt update && sudo apt install locales
      sudo locale-gen en_US en_US.UTF-8
      sudo update-locale LC_ALL=en_US.UTF-8 LANG=en_US.UTF-8
      export LANG=en_US.UTF-8
      locale  # verify settings
# -------------------------------------------------------------------------
check_nvidia_drivers:
  name: check_nvidia_drivers
  command: bash
  args:
    - -c
    - |
      echo "[INFO] Checking for NVIDIA Drivers..."
      if ! command -v nvidia-smi >/dev/null 2>&1; then
        if [ -f /usr/bin/nvidia-smi ]; then
          export PATH=$PATH:/usr/bin
        else
          echo "[ERROR] nvidia-smi not found! Please install NVIDIA Drivers for your GPU."
          exit 1
        fi
      fi
      
      if ! nvidia-smi >/dev/null 2>&1; then
        echo "[ERROR] nvidia-smi failed to communicate with the NVIDIA Driver."
        exit 1
      fi
      echo "[INFO] NVIDIA Drivers detected."
# -------------------------------------------------------------------------
install_system_prerequisites:
  name: install_system_prerequisites
  command: bash
  args:
    - -c
    - |
      echo "[INFO] Installing system prerequisites..."
      sudo apt-get update
      sudo apt-get install -y curl wget git build-essential gnupg
      sudo apt install software-properties-common
      sudo add-apt-repository universe -y
# -------------------------------------------------------------------------
install_go:
  name: install_go
  command: bash
  args:
    - -c
    - |
      if ! command -v go >/dev/null 2>&1; then
        echo "[INFO] Installing Go {go_version}..."
        wget https://go.dev/dl/go{go_version}.linux-amd64.tar.gz
        sudo rm -rf /usr/local/go
        sudo tar -C /usr/local -xzf go{go_version}.linux-amd64.tar.gz
        rm go{go_version}.linux-amd64.tar.gz
        export PATH=$PATH:/usr/local/go/bin
        
        if ! grep -q "/usr/local/go/bin" ~/.bashrc; then
          echo 'export PATH=$PATH:/usr/local/go/bin' >> ~/.bashrc
        fi
      else
        echo "[INFO] Go is already installed."
      fi
# -------------------------------------------------------------------------
install_docker:
  name: install_docker
  command: bash
  args:
    - -c
    - |
      if ! command -v docker >/dev/null 2>&1; then
        echo "[INFO] Installing Docker..."
        curl -fsSL https://get.docker.com -o get-docker.sh
        sudo sh get-docker.sh
        rm get-docker.sh
        sudo usermod -aG docker $USER
        echo "[INFO] Docker installed. You may need to log out and back in for group changes to take effect."
      else
        echo "[INFO] Docker is already installed."
      fi
# -------------------------------------------------------------------------
install_nvidia_container_toolkit:
  name: install_nvidia_container_toolkit
  command: bash
  args:
    - -c
    - |
      echo "[INFO] Installing/Configuring NVIDIA Container Toolkit..."
      
      # Setup repository
      curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
        sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg --yes
      
      curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
        sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
        sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
      
      sudo apt-get update
      sudo apt-get install -y nvidia-container-toolkit
# -------------------------------------------------------------------------
configure_docker_nvidia:
  name: configure_docker_nvidia
  command: bash
  args:
    - -c
    - |
      echo "[INFO] Configuring Docker daemon.json..."
      
      if [ ! -f /etc/docker/daemon.json ]; then
        sudo mkdir -p /etc/docker
        echo '{{}}' | sudo tee /etc/docker/daemon.json
      fi
      
      # Configure Docker for NVIDIA runtime
      sudo nvidia-ctk runtime configure --runtime=docker --config=/etc/docker/daemon.json
      sudo nvidia-ctk runtime configure --runtime=docker --set-as-default --cdi.enabled
      sudo nvidia-ctk config --set accept-nvidia-visible-devices-as-volume-mounts=true --in-place
      sudo systemctl restart docker
      echo "[INFO] NVIDIA Container Toolkit configured for Docker."
# -------------------------------------------------------------------------
install_nvkind:
  name: install_nvkind
  command: bash
  args:
    - -c
    - |
      echo "[INFO] Installing nvkind..."
      if ! command -v nvkind >/dev/null 2>&1; then
        export PATH=$PATH:/usr/local/go/bin:$(go env GOPATH)/bin
        go install github.com/NVIDIA/nvkind/cmd/nvkind@latest
        
        if ! grep -q "$(go env GOPATH)/bin" ~/.bashrc; then
          echo 'export PATH=$PATH:$(go env GOPATH)/bin' >> ~/.bashrc
        fi
        export PATH=$PATH:$(go env GOPATH)/bin
      else
        echo "[INFO] nvkind is already installed."
      fi
# -------------------------------------------------------------------------
install_kind:
  name: install_kind
  command: bash
  args:
    - -c
    - |
      if ! command -v kind >/dev/null 2>&1; then
        echo "[INFO] Installing KIND {kind_version}..."
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/{kind_version}/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
      else
        echo "[INFO] KIND is already installed."
      fi
# -------------------------------------------------------------------------
install_kubectl:
  name: install_kubectl
  command: bash
  args:
    - -c
    - |
      if ! command -v kubectl >/dev/null 2>&1; then
        echo "[INFO] Installing kubectl {kubectl_version}..."
        curl -LO "https://dl.k8s.io/release/{kubectl_version}/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
      else
        echo "[INFO] kubectl is already installed."
      fi
# -------------------------------------------------------------------------
install_helm:
  name: install_helm
  command: bash
  args:
    - -c
    - |
      if ! command -v helm >/dev/null 2>&1; then
        echo "[INFO] Installing Helm..."
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      else
        echo "[INFO] Helm is already installed."
      fi
# -------------------------------------------------------------------------
ngc_login:
  name: ngc_login
  command: bash
  args:
  - -c
  - |
    export NGC_CLI_API_KEY="{ngc_api_key}"
    export NGC_CLI_ORG="{ngc_org}"
    export NGC_CLI_TEAM="{ngc_team}"
    export NGC_CLI_ACE="no-ace"
    export NGC_CLI_FORMAT_TYPE="json"
    echo "{ngc_api_key}" | {bin_dir}/ngc-cli/ngc config set --auth-option api-key
    echo "{ngc_api_key}" | docker login nvcr.io -u '$oauthtoken' --password-stdin
# -------------------------------------------------------------------------
install_ngc_cli:
  name: install_ngc_cli
  command: bash
  args:
    - -c
    - |
      if [ ! -x "{bin_dir}/ngc-cli/ngc" ]; then
        echo "[INFO] Installing NVIDIA NGC CLI..."
        curl -fSL https://ngc.nvidia.com/downloads/ngccli_linux.zip -o ngccli_linux.zip
        mkdir -p {temp_dir} {bin_dir}
        unzip -o ngccli_linux.zip -d {temp_dir}
        mv {temp_dir}/ngc-cli {bin_dir}/ngc-cli
        chmod +x {bin_dir}/ngc-cli/ngc
        rm -rf ngccli_linux.zip
      else
        echo "[INFO] NVIDIA NGC CLI is already installed."
      fi
# -------------------------------------------------------------------------
verify_docker_gpu:
  name: verify_docker_gpu
  command: bash
  args:
    - -c
    - |
      echo "[INFO] Verifying Docker GPU support..."
      if ! docker run --rm --gpus all ubuntu:latest nvidia-smi >/dev/null 2>&1; then
        echo "[ERROR] Docker GPU support validation failed."
        exit 1
      fi
      echo "[INFO] Docker GPU support verified."
# -------------------------------------------------------------------------
setup_helm_repos:
  name: setup_helm_repos
  command: bash
  args:
    - -c
    - |
      echo "[INFO] Setting up Helm repositories..."
      helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
      helm repo update nvidia
# -------------------------------------------------------------------------
install_gpu_operator:
  name: install_gpu_operator
  command: bash
  args:
    - -c
    - |
      echo "[INFO] Installing GPU Operator..."
      helm upgrade --install gpu-operator nvidia/gpu-operator \
        --version {gpu_operator_version} \
        --namespace gpu-operator \
        --create-namespace \
        --set driver.enabled=false \
        --set toolkit.enabled=false \
        --set nfd.enabled=true \
        --wait
# -------------------------------------------------------------------------
install_kai_scheduler:
  name: install_kai_scheduler
  command: bash
  args:
    - -c
    - |
      echo "[INFO] Installing KAI Scheduler..."
      helm upgrade --install kai-scheduler \
        oci://ghcr.io/nvidia/kai-scheduler/kai-scheduler \
        --version {kai_scheduler_version} \
        --create-namespace -n kai-scheduler \
        --set global.nodeSelector.node_group=kai-scheduler \
        --set "scheduler.additionalArgs[0]=--default-staleness-grace-period=-1s" \
        --set "scheduler.additionalArgs[1]=--update-pod-eviction-condition=true" \
        --wait
# -------------------------------------------------------------------------