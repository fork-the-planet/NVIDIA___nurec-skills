# ---------------------------------------------------------------------------
# workflow variables
# ---------------------------------------------------------------------------

output_dir: "{results_dir}/av-datasets/{input_dataset_name}"
ncore_out_dir: "{output_dir}/ncore"

shm_size: 64g
run_id: "latest"

ncore_dataset_name: "{input_dataset_name}"
ncore_dataset_dir: "{ncore_out_dir}/{ncore_dataset_name}"
nurec_output_dir: "{output_dir}/nurec"

# ---------------------------------------------------------------------------
# workflow steps
# ---------------------------------------------------------------------------

# -------------------------------------------------------------------------
remove_output:
  name: remove_output
  command: bash
  args:
    - -c
    - |
        mkdir -p {output_dir}
        docker run --rm -v "{output_dir}:/out" alpine sh -c 'rm -rf /out/*'
# ---------------------------------------------------------------------------
download_pytorch:
  name: download_pytorch
  command: docker
  args:
    - pull
    - nvcr.io/nvidia/pytorch:24.10-py3

# ---------------------------------------------------------------------------
download_nre_ncore:
  name: download_nre_ncore
  command: bash
  args:
    - -c
    - |
      {bin_dir}/ngc-cli/ngc registry resource download-version '{nre_ncore_v3_resource}' --dest {dependencies_dir}
# ---------------------------------------------------------------------------
untar_ncore_main:
  name: untar_ncore_main
  command: tar
  args:
    - -xzf {dependencies_dir}/nre-ncore_vv3/ncore-main.tar.gz
    - -C {dependencies_dir}/nre-ncore_vv3
# ---------------------------------------------------------------------------
setup_pandaset_devkit:
  name: setup_pandaset_devkit
  command: pip
  args:
    - install
    - git+https://github.com/scaleapi/pandaset-devkit.git#subdirectory=python
# ---------------------------------------------------------------------------
# dump ncore diagnostic files
export_ncore_diagnostic:
  name: export_ncore_diagnostic
  command: docker
  image: "{nre_image}"
  args:
    - run
    # docker args
    - "--shm-size={shm_size}"
    - -it
    - --name export-ncore-diagnostic
    - --rm
    - --gpus all
    - --volume "{ncore_dataset_dir}:/workdir/dataset"
    - --volume "{output_dir}/ncore_diagnostics:/workdir/output"
    # image args
    - "{image}"
    - export-ncore-diagnostic
    - "--dataset-path=/workdir/dataset/{ncore_dataset_name}.json"
    - "--output-dir=/workdir/output"
    - "--all"
# ---------------------------------------------------------------------------
generate_dataset_manifest:
  name: generate_dataset_manifest
  command: bash
  args:
    - -c
    - |
      docker run --rm --gpus all --shm-size {shm_size} \
        --volume "{ncore_dataset_dir}:/workdir/dataset":rw \
        --volume "{dependencies_dir}/nre-ncore_vv3:/ncore":rw \
        nvcr.io/nvidia/pytorch:24.10-py3 bash -c \
        "pip install /ncore/ncore-0.16.11-py3-none-any.whl && \
        python3 /ncore/ncore-main/scripts/ncore_sequence_meta.py \
        --shard-file-pattern=/workdir/dataset/{ncore_dataset_name}.zarr.itar \
        --output-dir=/workdir/dataset \
        --output-file={ncore_dataset_name}.json \
        --debug"
# ---------------------------------------------------------------------------
generate_aux_data:
  name: generate_aux_data
  command: docker
  shm_size: 2g
  image: "{nre_tools_image}"
  args:
    - run
    # docker args
    - "--shm-size={shm_size}"
    - -it
    - --rm
    - --gpus all
    # env vars
    - --volume "{ncore_dataset_dir}:/workdir/dataset"
    # image args
    # The unobfuscated nre_tools image entrypoint (/app/apps/nre_tools) is a
    # click group of subcommands (ncore-aux-data, asset-harvester, mask-annotator);
    # pass the subcommand explicitly so the call doesn't rely on the click
    # default-group fallback.
    - "{image}"
    - ncore-aux-data
    - "--dataset-path=/workdir/dataset/{ncore_dataset_name}.json"
    - "--output-dir=/workdir/dataset"
    - "--store-meta"
    - "--no-seg-logits"
    - "--lidar-seg-camvis"
# ---------------------------------------------------------------------------
training:
  name: training
  command: bash
  image: "{nre_image}"
  args:
    - -c
    - |
      docker run \
        --shm-size={shm_size} -it --rm --ulimit nofile=2048:2048 --gpus all \
        -e "HYDRA_FULL_ERROR=1" \
        --volume "{ncore_dataset_dir}:/workdir/dataset" \
        --volume "{nurec_output_dir}:/workdir/output" \
        --volume "{nre_config_name}:{nre_config_dir}/external_overrides.yaml" \
        {image} \
        --config-name=external_overrides \
        mode=trainval \
        dataset.path=/workdir/dataset/{ncore_dataset_name}.json \
        out_dir=/workdir/output \
        logger=tensorboard \
        logger.run_id={run_id}
# ---------------------------------------------------------------------------
export_usdz_artifact:
  name: export_usdz_artifact
  command: bash
  image: "{nre_image}"
  args:
    - -c
    - |
      if [ "{export_usdz_type}" = "standard" ] || [ "{export_usdz_type}" = "both" ]; then
        echo "Exporting volume-based USDZ (standard)..."
        docker run \
          --shm-size={shm_size} -it --rm --gpus all \
          --volume "{ncore_dataset_dir}:/workdir/dataset" \
          --volume "{nurec_output_dir}:/workdir/output" \
          {image} \
          export-usdz-artifact \
          --config-name=/workdir/output/{run_id}/config/parsed.yaml \
          --checkpoint-name=/workdir/output/{run_id}/checkpoints/last.ckpt \
          --output-dir=/workdir/output/{run_id}/usd_out
        docker run --rm --entrypoint mv --volume "{nurec_output_dir}:/workdir/output" {image} \
          /workdir/output/{run_id}/usd_out/last.usdz /workdir/output/{run_id}/usd_out/volume_raw.usdz
      fi
      if [ "{export_usdz_type}" = "geompoints" ] || [ "{export_usdz_type}" = "both" ]; then
        echo "Exporting GeomPoints USDZ..."
        docker run \
          --shm-size={shm_size} -it --rm --gpus all \
          --volume "{ncore_dataset_dir}:/workdir/dataset" \
          --volume "{nurec_output_dir}:/workdir/output" \
          {image} \
          export-gaussian-usd-asset \
          --config-name=/workdir/output/{run_id}/config/parsed.yaml
        docker run --rm --entrypoint mv --volume "{nurec_output_dir}:/workdir/output" {image} \
          /workdir/output/{run_id}/usd_asset/{ncore_dataset_name}.usdz /workdir/output/{run_id}/usd_out/particle_raw.usdz
      fi
# ---------------------------------------------------------------------------
patch_volume_usdz:
  name: patch_volume_usdz
  command: bash
  image: "{real2sim_image}"
  args:
    - -c
    - |
      VOLUME_USDZ="{nurec_output_dir}/{run_id}/usd_out/volume_raw.usdz"
      if [ ! -f "$VOLUME_USDZ" ]; then
        echo "No volume USDZ found, skipping patch_volume_usdz."
        exit 0
      fi
      docker run \
        --rm \
        --volume "{nurec_output_dir}:/workdir/output" \
        --entrypoint=bash \
        {image} \
        -c "python /workspace/real2sim/tools/usdz/patch_usdz.pyc \
          --input_usdz /workdir/output/{run_id}/usd_out/volume_raw.usdz \
          --output_usdz /workdir/output/{run_id}/usd_out/volume.usdz \
          --remove_domelight"
# ---------------------------------------------------------------------------
patch_particle_usdz:
  name: patch_particle_usdz
  command: bash
  image: "{real2sim_image}"
  args:
    - -c
    - |
      PARTICLE_USDZ="{nurec_output_dir}/{run_id}/usd_out/particle_raw.usdz"
      if [ ! -f "$PARTICLE_USDZ" ]; then
        echo "No particle USDZ found, skipping patch_particle_usdz."
        exit 0
      fi
      docker run \
        --rm \
        --volume "{nurec_output_dir}:/workdir/output" \
        --entrypoint=bash \
        {image} \
        -c "python /workspace/real2sim/tools/usdz/patch_usdz.pyc \
          --input_usdz /workdir/output/{run_id}/usd_out/particle_raw.usdz \
          --output_usdz /workdir/output/{run_id}/usd_out/particle.usdz \
          --set_tonemap_srgb"
# ---------------------------------------------------------------------------
render_usdz:
  name: render_usdz
  command: docker
  image: "{nre_image}"
  args:
    - run
    # docker args
    - "--shm-size={shm_size}"
    - -it
    - --name render-usdz
    - --rm
    - --gpus all
    # env vars
    - --volume "{ncore_dataset_dir}:/workdir/dataset"
    - --volume "{nurec_output_dir}:/workdir/output"
    # image args
    - "{image}"
    - render
    - "--artifact-path=/workdir/output/{run_id}/usd_out/volume.usdz"
    - "--output-dir=/workdir/output/{run_id}/render_out"
    - "--image-format=png"
    - "--camera-id={camera_to_render}"
    - "--height=1024"
# ---------------------------------------------------------------------------
download_fixer:
  name: download_fixer
  command: bash
  args:
    - -c
    - |
      {bin_dir}/ngc-cli/ngc registry model download-version "nvidia/nre/nurec-fixer:cosmos_3dgut" --dest {dependencies_dir}
# ---------------------------------------------------------------------------
run_fixer:
  name: run_fixer
  command: bash
  args:
    - -c
    - |
      docker run --rm --runtime=nvidia --gpus all --shm-size {shm_size} \
        --volume "{nurec_output_dir}/{run_id}/render_out/{camera_to_render}:/workdir/images":rw \
        --volume "{dependencies_dir}/nurec-fixer_vcosmos_3dgut:/fixer":rw \
        nvcr.io/nvidia/pytorch:24.10-py3 bash -c \
        "python3 /fixer/infer_cosmos.py --image_path /workdir/images/ --output_path /workdir/images/fixer/ --model_path /fixer/cosmos_3dgut.pt --res 1024"
# ---------------------------------------------------------------------------
export_gaussian_plys:
  name: export_gaussian_plys
  command: docker
  image: "{nre_image}"
  args:
    - run
    # docker args
    - "--shm-size={shm_size}"
    - -it
    - --name export-gaussian-plys
    - --rm
    - --gpus all
    - --network host
    # volume mounts
    - --volume "{ncore_dataset_dir}:/workdir/dataset"
    - --volume "{nurec_output_dir}:/workdir/output"
    # image args
    - "{image}"
    - export-gaussian-plys
    - --config-name=/workdir/output/{run_id}/config/parsed.yaml
    - --checkpoint-name=last.ckpt
    - --output-dir=/workdir/output/{run_id}/gaussian_plys
    - --format=_3DGRT
    - --percentage-gaussians=100
# ---------------------------------------------------------------------------
check_val_metrics:
  name: check_val_metrics
  command: bash
  args:
    - -c
    - |
      python3 - "{nurec_output_dir}/{run_id}/val/metrics.yaml" \
        "{min_test_psnr}" "{max_test_elapsed_time_s}" << 'PY'
      import sys
      import re
      path, min_psnr, max_elapsed = sys.argv[1:4]
      min_psnr = float(min_psnr)
      max_elapsed = float(max_elapsed)
      with open(path) as f:
          lines = f.readlines()
      # Parse aggregated_metrics: test/psnr and test/elapsed_time_s (each has value: X)
      values = {{}}
      has_per_camera_samples = False
      in_agg = False
      current_key = None
      for line in lines:
          if re.match(r"^\s*per_camera\s*:\s*$", line):
              has_per_camera_samples = True
          if re.match(r"^aggregated_metrics\s*:\s*$", line):
              in_agg = True
              continue
          if not in_agg:
              continue
          key_match = re.match(r"^\s{{2}}(test/psnr|test/elapsed_time_s)\s*:\s*$", line)
          if key_match:
              current_key = key_match.group(1)
              continue
          if current_key:
              val_match = re.search(r"value\s*:\s*([\d.e+-]+)", line)
              if val_match:
                  values[current_key] = float(val_match.group(1))
                  current_key = None
      missing = [k for k in ("test/psnr", "test/elapsed_time_s") if k not in values]
      if "test/elapsed_time_s" in missing:
          print("ERROR: Missing metrics in " + path + ": test/elapsed_time_s")
          sys.exit(1)
      skip_psnr = False
      if "test/psnr" in missing:
          if has_per_camera_samples:
              print("ERROR: Missing metrics in " + path + ": test/psnr")
              print("Found per-camera validation samples, so PSNR is expected.")
              sys.exit(1)
          skip_psnr = True
          print("WARNING: test/psnr is missing because no camera validation samples were found; skipping PSNR check.")
      elif "test/psnr" not in values:
          print("ERROR: Missing metrics in " + path + ": test/psnr")
          sys.exit(1)
      ok = True
      psnr = values.get("test/psnr")
      if not skip_psnr:
          assert psnr is not None
          if psnr < min_psnr:
              print("ERROR: test/psnr %.4f < min threshold %.4f" % (psnr, min_psnr))
              ok = False
      elapsed = values["test/elapsed_time_s"]
      if elapsed > max_elapsed:
          print("ERROR: test/elapsed_time_s %.4f > max threshold %.4f" % (elapsed, max_elapsed))
          ok = False
      if ok:
          if skip_psnr:
              print("Validation metrics meet thresholds (PSNR check skipped due to no camera validation samples).")
          else:
              print("test/psnr and test/elapsed_time_s meet thresholds.")
              print("  test/psnr: %.4f (min %.4f)" % (psnr, min_psnr))
          print("  test/elapsed_time_s: %.4f (max %.4f)" % (elapsed, max_elapsed))
      else:
          print("Val metrics did NOT meet thresholds.")
      sys.exit(not ok)
      PY
# ---------------------------------------------------------------------------
