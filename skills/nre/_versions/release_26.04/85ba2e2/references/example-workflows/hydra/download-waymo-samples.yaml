# Simple workflow that installs Google Cloud SDK and downloads a Waymo
# Open Dataset sample TFRecord into `./local/input/av-datasets/waymo`.
defaults:
  - /paths
  - /personal
  - _self_

# Destination folder and Waymo sample configuration
waymo_dataset_dir: "{local_dir}/input/av-datasets/waymo"
# Override from CLI must be quoted so Hydra keeps it as a string (e.g. waymo_sample_number="1005081002024129653_5313_150_5333_150").
# Unquoted values are parsed as integers and underscores are lost, breaking waymo_sample_url.
waymo_sample_number: "1005081002024129653_5313_150_5333_150"
waymo_sample_name: "segment-{waymo_sample_number}_with_camera_labels"
waymo_sample_url: "https://storage.googleapis.com/waymo_open_dataset_v_1_4_3/individual_files/training/{waymo_sample_name}.tfrecord"

steps:
  - ${ensure_waymo_dataset_dir}
  - ${download_waymo_sample}

ensure_waymo_dataset_dir:
  name: ensure_waymo_dataset_dir
  command: bash
  args:
    - -c
    - |
      mkdir -p {waymo_dataset_dir}

download_waymo_sample:
  name: download_waymo_sample
  command: bash
  args:
    - -c
    - |
      ACCESS_TOKEN=$(gcloud auth print-access-token 2>/dev/null) || true
      cd {waymo_dataset_dir}
      curl -L \
        -H "Authorization: Bearer $ACCESS_TOKEN" \
        -O "{waymo_sample_url}"
      # Rename file: remove 'segment-' prefix and '_with_camera_labels' suffix
      mv '{waymo_sample_name}.tfrecord' '{waymo_sample_number}.tfrecord'

