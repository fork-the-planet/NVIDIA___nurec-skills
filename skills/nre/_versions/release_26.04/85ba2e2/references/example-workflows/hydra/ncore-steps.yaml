# -------------------------------------------------------------------------
remove_ncore_output:
  name: remove_ncore_output
  command: bash
  args:
    - -c
    - |-
        docker run --rm -v "{ncore_out_dir}:/out" alpine sh -c 'rm -rf /out/*'
        mkdir -p {ncore_out_dir}        
# ---------------------------------------------------------------------------
download_nre_ncore_v1:
  name: download_nre_ncore_v1
  command: bash
  args:
    - -c
    - |
      {bin_dir}/ngc-cli/ngc registry resource download-version '{nre_ncore_v1_resource}' --dest {dependencies_dir}
# ---------------------------------------------------------------------------
untar_ncore_waymo:
  name: untar_ncore_waymo
  command: tar
  args:
    - -xzf {dependencies_dir}/nre-ncore_vv3/ncore-waymo-378ce482.tar.gz
    - -C {dependencies_dir}/nre-ncore_vv3
# ---------------------------------------------------------------------------
patch_ncore_waymo:
  name: patch_ncore_waymo
  command: bash
  args:
    - -c
    - |
      REQ_IN="{dependencies_dir}/nre-ncore_vv3/ncore-waymo-378ce482/3rdparty/python/requirements_3_11.in"
      REQ_TXT="{dependencies_dir}/nre-ncore_vv3/ncore-waymo-378ce482/3rdparty/python/requirements_3_11.txt"
      sed -i '/^--find-links .*nre-ncore_vv1/d' "$REQ_IN" "$REQ_TXT"
      sed -i "1i\--find-links {dependencies_dir}/nre-ncore_vv1" "$REQ_IN" "$REQ_TXT"
      # rules_python>=0.27 refuses to use its hermetic Python interpreter when
      # the current user is root (see https://github.com/bazelbuild/rules_python/pull/713).
      # CI containers run as root, so add `ignore_root_user_error = True` to the
      # python.toolchain() call in MODULE.bazel to bypass the check. This is a no-op
      # when running as a non-root user (e.g. local dev).
      MODULE_BAZEL="{dependencies_dir}/nre-ncore_vv3/ncore-waymo-378ce482/MODULE.bazel"
      if ! grep -q "ignore_root_user_error" "$MODULE_BAZEL"; then
        sed -i 's|^\(python\.toolchain(\)$|\1\n    ignore_root_user_error = True,|' "$MODULE_BAZEL"
      fi
# ---------------------------------------------------------------------------
run_ncore_waymo:
  name: run_ncore_waymo
  command: bash
  args:
    - -c
    - |-
      set -euxo pipefail
      echo "[run_ncore_waymo] PWD before cd: $(pwd)"
      echo "[run_ncore_waymo] Target dir contents:"
      if ! ls -la "{dependencies_dir}/nre-ncore_vv3/ncore-waymo-378ce482"; then
        echo "[run_ncore_waymo] Target dir missing"
        exit 1
      fi
      cd "{dependencies_dir}/nre-ncore_vv3/ncore-waymo-378ce482"
      echo "[run_ncore_waymo] which bazel: $(command -v bazel || true)"
      echo "[run_ncore_waymo] bazel --version:"
      bazel --version || true
      echo "[run_ncore_waymo] About to invoke bazel run ..."
      bazel run //scripts:convert_raw_data -- --root-dir "{input_dataset_dir}" --output-dir "{ncore_out_dir}" waymo-v3
# ---------------------------------------------------------------------------
