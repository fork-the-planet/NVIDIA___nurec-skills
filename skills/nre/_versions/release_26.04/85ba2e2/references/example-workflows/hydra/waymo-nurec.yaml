# @package _global_
# configs to aggregate
defaults:
  - /paths # paths
  - /personal # credentials and secrets
  - /tools
  - nurec-steps # bank of all steps
  - ncore-steps # ncore workflow steps
  - _self_

# steps to use in this workflow
steps:
  - ${remove_output}
  - ${install_ngc_cli}
  - ${ngc_login}
  - ${download_nre_ncore_v1}
  - ${download_nre_ncore}
  - ${untar_ncore_main}
  - ${untar_ncore_waymo}
  - ${patch_ncore_waymo}
  - ${run_ncore_waymo}
  - ${generate_dataset_manifest}
  - ${export_ncore_diagnostic}
  - ${download_pytorch}
  - ${generate_aux_data}
  - ${training}
  - ${export_usdz_artifact}
  - ${patch_volume_usdz}
  - ${patch_particle_usdz}
  - ${render_usdz}
  #- ${download_fixer}
  #- ${run_fixer}
  - ${export_gaussian_plys}
  - ${check_val_metrics}

# input dataset
input_dataset_dir: "{input_dir}/av-datasets/waymo" # change this to your dataset directory
input_dataset_name: "1005081002024129653_5313_150_5333_150" # change this to your dataset name

# nurec config overrides
nre_config_name: "{config_dir}/nre-overrides/waymo.yaml"

# camera to render
camera_to_render: "camera_front_50fov"

# USDZ export type: "standard" (volume-based), "geompoints" (GeomPoints), or "both"
export_usdz_type: "both"

# Use org/team-scoped NGC resource path so CI (NUREC_NGC_ORG/TEAM) can access nre-ncore
nre_ncore_v1_resource: "nvidia/nre/nre-ncore:v1"
nre_ncore_v3_resource: "nvidia/nre/nre-ncore:v3"

nre_registry: "nvcr.io/nvidian/ct-toronto-ai"
nre_image: "{nre_registry}/nre_run:26.4.140-6a9229ea"
nre_tools_image: "{nre_registry}/nre_tools:26.4.140-6a9229ea"

# Path to the configs/ directory inside the unobfuscated nre_run image.
# The /app/run entrypoint launches with workdir=/app/run.runfiles/_main,
# so configs ship at /app/run.runfiles/_main/configs.
nre_config_dir: "/app/run.runfiles/_main/configs" # NRE 26.4

real2sim_image: "gitlab-master.nvidia.com:5005/visual_mapping/real2sim/real2sim-release:5d069187" # replace with official image on NGC when ready

real2sim_config_file_path: "{config_dir}/real2sim-configs/robotics-nurec.yaml"

# Val metrics thresholds: test/psnr fail if value < min; test/elapsed_time_s fail if value > max
min_test_psnr: 28.0
max_test_elapsed_time_s: 1000.0