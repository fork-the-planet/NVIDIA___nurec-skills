# NRE config overrides for the NVIDIA Physical AI Autonomous Vehicles (PAI)
# dataset. Loaded by `configs/pai-nurec.yaml` (and any other workflow that
# sets `nre_config_name` to this file) and mounted into the NRE GA container
# at `{nre_config_dir}/external_overrides.yaml`.
#
# `car2sim_6cam` matches the Hyperion-8.1 reconstruction settings used by the
# Maglev PAI reconstruction workflow. Only the keys that differ from
# `car2sim_6cam.yaml`'s resolved defaults are overridden here (plus an explicit
# `camera_ids` guard); everything else is inherited from `car2sim_6cam`.
defaults:
  - /apps/prod/Hyperion-8.1/car2sim_6cam.yaml
  # Add lidar `intensity` as a per-layer extra signal so the model predicts it
  # and the renderer emits it during lidar validation. `semantic_logits` is
  # retained because `car2sim` relies on it. Every layer `car2sim_6cam` defines
  # (background, road, dynamic_deformables, dynamic_rigids) must be listed,
  # otherwise the unlisted layers keep semantics-only signals.
  # - /model/gaussians/extra_signal@model.layers.background.extra_signal: [semantic_logits, intensity]
  # - /model/gaussians/extra_signal@model.layers.road.extra_signal: [semantic_logits, intensity]
  # - /model/gaussians/extra_signal@model.layers.dynamic_deformables.extra_signal: [semantic_logits, intensity]
  # - /model/gaussians/extra_signal@model.layers.dynamic_rigids.extra_signal: [semantic_logits, intensity]
  - _self_

dataset:
  # Explicit guard that the trained sensors match what `pai-to-ncore` exported
  # into the NCore shard. These six already match `car2sim_6cam`'s defaults.
  camera_ids:
    - camera_front_wide_120fov
    - camera_front_tele_30fov
    - camera_cross_right_120fov
    - camera_cross_left_120fov
    - camera_rear_left_70fov
    - camera_rear_right_70fov
  # Validate on all trained cameras. `car2sim_6cam` validates only the four
  # front/side cameras by default, which would exclude the two rear cameras.
  val_camera_ids:
    - camera_front_wide_120fov
    - camera_front_tele_30fov
    - camera_cross_right_120fov
    - camera_cross_left_120fov
    - camera_rear_left_70fov
    - camera_rear_right_70fov
  # Lidar sensor that `pai-to-ncore` exports for PAI clips.
  lidar_ids:
    - lidar_top_360fov
  # Pixel subsample factor for training.
  samplers:
    batch_sampler:
      camera_pixel_sampler:
        subsample: 2
  # Return lidar rays at validation/test time so lidar point clouds are produced.
  val_lidar: true

# Supervise predicted lidar intensity (the AV loss recipe disables it with
# lambda_ 0.0). Without supervision the intensity extra signal is emitted but
# never learned, so the predicted point cloud's intensity would be meaningless.
loss:
  intensity:
    lambda_: 1.0
