# Carline-adaptation demo — LOCAL OSMO reproduction.
#
# This is the OSMO-local equivalent of the warm `nre serve-grpc` + thin
# client path. The thin client overlays the augmented rig per-RPC; the
# `nre render` CLI cannot, so the rig is applied via the two-step
# export-custom-rig-trajectory → render --custom-rig-trajectory flow
#
# Structural reference: nre render-usdz.yaml (download-from-hf → render →
# convert-to-video). Adapted for: the augmented rig, the recorded GT
# reference MP4 as the comparison baseline, viewer-ready MP4 filenames,
# 30 fps / CRF 23 H.264 encode, and the LOCAL MicroK8s + MinIO backend.
#
# ── LOCAL backend assumptions (differ from the AKS cloud examples) ──
#   * Single pool `default` with a single platform `default`
#     (OSMO minimal deploy; orion install). So resource sets carry NO
#     `platform:` key — `system`/`gpu` platforms exist only on the
#     Azure reference cluster. A GPU attaches purely by requesting
#     `gpu: 1`; the local `default_user` pod template already bakes
#     `nvidia.com/gpu: {{USER_GPU}}` into the only platform.
#   * Storage backend is local MinIO; the default bucket is
#     `s3://osmo-workflows`. Named-dataset outputs (`outputs.dataset`)
#     land there, so `osmo dataset download` works without any S3 URL.
#   * Workflow images are served from MicroK8s containerd preloads
#     (registry validation for nvcr.io is disabled locally). The NRE
#     image below must already be preloaded, or an `nvcr` registry
#     credential must be set.
#   * Only one GPU on the box: `export-rig-trajectory` and
#     `render-augmented` are serialized by the rig-trajectory dataset
#     dependency, so they never contend for the single GPU. No
#     `depends_on:` tie is needed.
#
# ── Prerequisites (once, before first submit) ──
#   1. Local OSMO is up (orion install_local; `osmo workflow list` against
#      http://localhost:9000 succeeds). See the carline SKILL.md OSMO
#      section step 0.
#   2. export NGC_API_KEY=nvapi-...
#      osmo credential set hf-token --type GENERIC  --payload token=hf_YOUR_TOKEN_HERE
#      osmo credential set nvcr     --type REGISTRY --payload registry=nvcr.io username=\$oauthtoken auth=$NGC_API_KEY
#   3. Upload the carline-adapted rig as a dataset named `augmented-rig`
#      (the bundled rig ships in the nre skill):
#        osmo dataset upload augmented-rig \
#          "$(git rev-parse --show-toplevel)/3rdparty/nurec-skills/skills/nre/references/rig-json/augmented_rig.json"
#      (Upload the directory or the single file — the export task globs
#      for *.json under the mounted dataset.)
#
# ── Submit ──
#   osmo workflow submit carline-demo-local.yaml --pool default
#
# ── Collect (into the openclaw workspace so the viewer can read it) ──
#   osmo dataset download carline-demo-compare \
#     "$HOME/openclaw-data/output/rural-0fd06bc3-demo"
#   Then regenerate the viewer manifest (see ../comparison-viewer.md).
#   The downloaded set already contains the gt_/plain MP4 pair named for
#   the viewer, so no host-side ffmpeg is required.
#
# DAG:
#   download-from-hf ──┬─→ export-rig-trajectory ─→ render-augmented ─→ convert-and-pair
#                      └──────────────────────────────────────────────────┘

default-values:
  hf_dataset: "nvidia/PhysicalAI-Autonomous-Vehicles-NuRec"
  release: "26.02_release"
  # Rural construction-zone clip — the canonical carline demo default and the
  # only clip pre-loaded on the instance (see ../preloaded-and-compute.md).
  # Override via workflow params for any other clip (downloaded from HF first).
  clip_id: "0fd06bc3-1899-4b45-9278-c5c018b3968d"
  camera_to_render: "camera_front_wide_120fov"
  # nre/nre:latest is deprecated; nre-ga is the GA build's public NGC home.
  # export-custom-rig-trajectory + --custom-rig-trajectory require 26.03+;
  # the GA image satisfies this. Must be preloaded into MicroK8s containerd
  # locally (registry validation for nvcr.io is disabled on the local deploy).
  nre_image: "nvcr.io/nvidia/nre/nre-ga:latest"
  # Unobfuscated public entrypoint of the GA OCI image (//:run → /app/run).
  nre_entrypoint: /app/run
  # Matches the bundled augmented_rig.json — the carline-adapted optics.
  rig_filename: "augmented_rig.json"
  render_height: "1080"        # warm-thin default; viewer pre-scales to 1080p
  video_framerate: "30"        # demo encode: 30 fps
  video_crf: "23"              # demo encode: H.264 CRF 23
  # /dev/shm remount target. Keep <= the local default_user pod template's
  # dshm emptyDir sizeLimit (32Gi on the orion local deploy) or the remount
  # fails. A single-camera render needs far less than training.
  shm_size: 16g

workflow:
  name: carline-demo-local
  # LOCAL single-pool / single-platform: no `platform:` keys (see header).
  # Sized for one MicroK8s node; bump if the box is larger or the clip
  # download/frames are bigger.
  resources:
    default:
      cpu: 2
      memory: 8Gi
      storage: 20Gi
    gpu:
      cpu: 4
      memory: 32Gi
      gpu: 1
      storage: 40Gi
  tasks:
  # =====================================================================
  #  Phase 1 — download USDZ + recorded reference MP4 from HuggingFace
  #  The reference MP4 ships alongside the clip's USDZ in the PAI dataset
  #  (see local-render.md) and becomes the GT baseline panel in the viewer.
  # =====================================================================
  - name: download-from-hf
    image: ubuntu:24.04
    credentials:
      hf-token: /tmp/hf
    command: [bash, -c]
    args:
    - |
      set -euo pipefail
      apt-get update && apt-get install -y curl

      HF_TOKEN=$(cat /tmp/hf/token)
      CLIP_DIR="sample_set/{{release}}/{{clip_id}}"
      BASE="https://huggingface.co/datasets/{{hf_dataset}}/resolve/main/${CLIP_DIR}"

      mkdir -p {{output}}/usdz {{output}}/reference

      echo "=== Downloading {{clip_id}}.usdz ==="
      USDZ_CODE=$(curl -fSL -w '%{http_code}' \
        -H "Authorization: Bearer ${HF_TOKEN}" \
        -o {{output}}/usdz/{{clip_id}}.usdz \
        "${BASE}/{{clip_id}}.usdz" || true)
      if [ ! -s {{output}}/usdz/{{clip_id}}.usdz ] || { [ "$USDZ_CODE" -ge 400 ] 2>/dev/null; }; then
        echo "ERROR: USDZ download failed (HTTP $USDZ_CODE) from ${BASE}/{{clip_id}}.usdz"
        echo "Check clip_id '{{clip_id}}' and release '{{release}}'."
        exit 1
      fi

      echo "=== Downloading recorded reference {{camera_to_render}}.mp4 (GT baseline) ==="
      # Best-effort: the recorded MP4 is the faithful GT, but if a given
      # clip ships without it the workflow still produces the adapted
      # render; convert-and-pair then emits only the adapted MP4 and warns.
      MP4_CODE=$(curl -fSL -w '%{http_code}' \
        -H "Authorization: Bearer ${HF_TOKEN}" \
        -o {{output}}/reference/{{camera_to_render}}.mp4 \
        "${BASE}/{{camera_to_render}}.mp4" || true)
      if [ ! -s {{output}}/reference/{{camera_to_render}}.mp4 ] || { [ "$MP4_CODE" -ge 400 ] 2>/dev/null; }; then
        echo "WARNING: reference MP4 not available (HTTP $MP4_CODE); GT panel will be skipped."
        rm -f {{output}}/reference/{{camera_to_render}}.mp4
      fi

      echo "=== Downloaded ==="
      ls -lhR {{output}}
    outputs:
    - dataset:
        name: clip-source

  # =====================================================================
  #  Phase 2 — bake the augmented rig into a custom rig trajectory
  #  Equivalent to the thin client's per-RPC rig overlay; the CLI needs
  #  this pre-step. Optimization: a pre-baked trajectory ships at
  #  ../../../3rdparty/nurec-skills/skills/nre/references/custom-rig-trajectories/0fd06bc3_custom_rig_trajectories.json
  #  — upload it as a dataset and skip this task to save a GPU pass.
  # =====================================================================
  - name: export-rig-trajectory
    image: '{{nre_image}}'
    inputs:
    - task: download-from-hf      # {{input:0}}
    - dataset:
        name: augmented-rig       # {{input:1}}  (uploaded; see header)
    command: [bash, -c]
    args:
    - |
      set -euo pipefail

      RIG_JSON=$(find {{input:1}} -name '{{rig_filename}}' -type f | head -1)
      [ -n "$RIG_JSON" ] || RIG_JSON=$(find {{input:1}} -name '*.json' -type f | head -1)
      [ -n "$RIG_JSON" ] || { echo "ERROR: no rig JSON in the augmented-rig dataset"; exit 1; }
      echo "Using rig JSON: $RIG_JSON"

      # Bake the augmented per-camera calibrations onto the scene trajectory.
      {{nre_entrypoint}} export-custom-rig-trajectory \
        --artifact-path={{input:0}}/usdz/{{clip_id}}.usdz \
        --rig-json="$RIG_JSON" \
        --output={{output}}/custom_rig_trajectories.json

      echo "=== Rig trajectory baked ==="
      ls -lh {{output}}
    environment:
      SHM_SIZE: '{{shm_size}}'
    resource: gpu
    outputs:
    - dataset:
        name: rig-trajectory

  # =====================================================================
  #  Phase 3 — render the carline-adapted view through that trajectory
  #  --no-replicate-training-views is mandatory with a custom rig
  #  trajectory (the training ISP/intrinsics no longer apply).
  #  --renderer default loads the artifact's natively-trained renderer.
  #  Contiguous frame naming so the ffmpeg %06d pattern works downstream.
  # =====================================================================
  - name: render-augmented
    image: '{{nre_image}}'
    inputs:
    - task: download-from-hf      # {{input:0}}
    - task: export-rig-trajectory # {{input:1}}
    command: [bash, -c]
    args:
    - |
      set -euo pipefail

      {{nre_entrypoint}} render \
        --artifact-path={{input:0}}/usdz/{{clip_id}}.usdz \
        --output-dir={{output}} \
        --custom-rig-trajectory={{input:1}}/custom_rig_trajectories.json \
        --no-replicate-training-views \
        --renderer default \
        --camera-id={{camera_to_render}} \
        --image-format=jpeg \
        --height={{render_height}} \
        --frame-step=1 \
        --frame-naming=contiguous-output-index

      echo "=== Rendered frames ==="
      ls -lh {{output}}/{{camera_to_render}} 2>/dev/null | head
    environment:
      SHM_SIZE: '{{shm_size}}'
    resource: gpu
    outputs:
    - dataset:
        name: render-frames

  # =====================================================================
  #  Phase 4 — encode the adapted render + pair the recorded GT MP4
  #  Emits the two viewer-ready filenames into one dataset:
  #    gt_<cam>.mp4  (left  / baseline = recorded reference)
  #    <cam>.mp4     (right / comparison = carline-adapted render)
  #  See ../comparison-viewer.md § 0 for the naming contract.
  # =====================================================================
  - name: convert-and-pair
    image: ubuntu:24.04
    inputs:
    - task: download-from-hf      # {{input:0}}  (recorded reference MP4)
    - task: render-augmented      # {{input:1}}  (adapted frames)
    command: [bash, -c]
    args:
    - |
      set -euo pipefail
      apt-get update && apt-get install -y ffmpeg

      CAM="{{camera_to_render}}"

      # Frames land at <output-dir>/<sensor_id>/<frame>.jpeg per the render CLI.
      FRAME_DIR="{{input:1}}/$CAM"
      [ -d "$FRAME_DIR" ] || FRAME_DIR="{{input:1}}"
      COUNT=$(find "$FRAME_DIR" -maxdepth 1 -name '*.jpeg' | wc -l)
      [ "$COUNT" -gt 0 ] || { echo "ERROR: no rendered frames under $FRAME_DIR"; exit 1; }
      echo "Encoding $COUNT adapted frames -> {{output}}/${CAM}.mp4"

      # Demo encode parameters: 30 fps, H.264, yuv420p, CRF 23.
      ffmpeg -y -framerate {{video_framerate}} -start_number 0 \
        -i "$FRAME_DIR/%06d.jpeg" \
        -c:v libx264 -pix_fmt yuv420p -preset fast -crf {{video_crf}} \
        "{{output}}/${CAM}.mp4"

      # GT baseline = recorded reference MP4, renamed with the gt_ prefix.
      REF_MP4="{{input:0}}/reference/${CAM}.mp4"
      if [ -s "$REF_MP4" ]; then
        cp "$REF_MP4" "{{output}}/gt_${CAM}.mp4"
        echo "Paired recorded GT -> {{output}}/gt_${CAM}.mp4"
      else
        echo "WARNING: no recorded reference MP4; viewer will show the adapted render only."
      fi

      echo "=== Comparison set ==="
      ls -lh {{output}}
    outputs:
    - dataset:
        name: carline-demo-compare
