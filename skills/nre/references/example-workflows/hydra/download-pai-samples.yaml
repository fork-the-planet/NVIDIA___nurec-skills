# Workflow that clones the upstream `nvidia/ncore` repo and uses its
# `pai-clip-dl` tool to download a single clip from the HuggingFace
# `nvidia/PhysicalAI-Autonomous-Vehicles` (PAI) dataset.
#
# Output layout (consumed as-is by the `pai-to-ncore` workflow):
#   {pai_dataset_dir}/{pai_clip_id}/
#   ├── calibration/
#   ├── labels/
#   ├── camera/
#   ├── lidar/
#   └── metadata/
#
# Pre-requisites:
#   - `huggingface_token` set in configs/personal.yaml
#   - The NVIDIA AV Dataset License Agreement accepted on
#     https://huggingface.co/datasets/nvidia/PhysicalAI-Autonomous-Vehicles
#   - `bazel` (bazelisk) on PATH — see prerequisites.txt
#
# Example:
#   ./run.sh --workflow download-pai-samples
#   ./run.sh --workflow download-pai-samples \
#     pai_clip_id="0fd06bc3-1899-4b45-9278-c5c018b3968d"
defaults:
  - /paths
  - /personal
  - pai-steps
  - _self_

steps:
  - ${ensure_pai_dataset_dir}
  - ${clone_ncore_repo}
  - ${download_pai_clip}
