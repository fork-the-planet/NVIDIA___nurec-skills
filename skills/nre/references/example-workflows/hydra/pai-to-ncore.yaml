# Workflow that converts a previously-downloaded NVIDIA Physical AI
# Autonomous Vehicles (PAI) clip into NCore V4 using the upstream
# `nvidia/ncore` `pai:convert` tool (`pai-v4` subcommand).
#
# Input  (from the `download-pai-samples` workflow or any compatible source):
#   {pai_dataset_dir}/{pai_clip_id}/{calibration,labels,camera,lidar,metadata}/
# Output:
#   {ncore_out_dir}/pai_{pai_clip_id}/pai_{pai_clip_id}.ncore4.zarr.itar
#   {ncore_out_dir}/pai_{pai_clip_id}/pai_{pai_clip_id}.json   (sequence-meta)
#
# `--sequence-meta` is enabled (default) so NRE training and aux-data steps
# can consume the manifest directly — no separate manifest-generation step
# is needed for PAI.
#
# Example:
#   ./run.sh --workflow pai-to-ncore
#   ./run.sh --workflow pai-to-ncore pai_clip_id="<your-uuid>"
defaults:
  - /paths
  - /personal
  - pai-steps
  - _self_

# Wire the converter output into the same directory layout used by
# `nurec-steps.yaml`, so the downstream `pai-nurec` workflow can pick it up
# without any extra remapping.
input_dataset_name: "pai_{pai_clip_id}"
output_dir: "{results_dir}/av-datasets/{input_dataset_name}"
ncore_out_dir: "{output_dir}/ncore"
ncore_dataset_name: "{input_dataset_name}"
ncore_dataset_dir: "{ncore_out_dir}/{ncore_dataset_name}"

steps:
  - ${clone_ncore_repo}
  - ${run_pai_to_ncore}
