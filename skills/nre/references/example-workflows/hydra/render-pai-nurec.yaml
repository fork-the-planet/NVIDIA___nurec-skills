# Workflow that renders the NuRec USDZ produced by `pai-nurec` for a single
# PAI clip. Uses the public `nvcr.io/nvidia/nre/nre-ga` container's `render`
# subcommand against the raw volume USDZ (no `real2sim` patcher required).
#
# By default this renders the training trajectory of the camera selected by
# `camera_to_render`. Point `pai_render_usdz` at any other USDZ on disk to
# render an arbitrary scene without re-running training.
#
# Example:
#   ./run.sh --workflow render-pai-nurec
#   ./run.sh --workflow render-pai-nurec camera_to_render=camera_cross_left_120fov
#   ./run.sh --workflow render-pai-nurec \
#     pai_render_usdz=/abs/path/to/some.usdz
#
# Output frames are written to {nurec_output_dir}/{run_id}/render_out/.
defaults:
  - /paths
  - /personal
  - /tools
  - pai-steps
  - _self_

steps:
  - ${install_ngc_cli}
  - ${ngc_login}
  - ${render_pai_usdz}

# ---------------------------------------------------------------------------
# Output layout (matches the pai-nurec workflow so the freshly-trained
# USDZ is found automatically).
# ---------------------------------------------------------------------------
input_dataset_name: "pai_{pai_clip_id}"
output_dir: "{results_dir}/av-datasets/{input_dataset_name}"
nurec_output_dir: "{output_dir}/nurec"
run_id: "latest"
shm_size: "64g"

# Which USDZ to render. Defaults to the volume-based reconstruction the
# `pai-nurec` workflow wrote at `{nurec_output_dir}/{run_id}/usd_out/
# volume_raw.usdz`. The path is resolved inside the docker container; the
# host volume mount is `{nurec_output_dir}:/workdir/output`, so anything
# under that directory is reachable as `/workdir/output/...`. Override
# with an absolute host path to render a USDZ from elsewhere — adjust the
# volume mount in `render_pai_usdz` accordingly when you do so.
pai_render_usdz: "/workdir/output/{run_id}/usd_out/volume_raw.usdz"

# Camera to render. Must be one of the `pai_camera_ids` that was actually
# trained on (see `nre-overrides/pai.yaml`).
camera_to_render: "camera_front_wide_120fov"
render_height: 1024

# NRE GA image (public). NGC login is still required for `docker pull`.
#
# Pinned to the linux/amd64 image-manifest digest (NOT `:latest`) for the same
# reason as pai-nurec.yaml: the multi-arch OCI index + buildx attestation
# manifest makes some docker/runner versions abort `docker run` with
# `error from registry: Incorrect Repository Format`. Pulling the amd64
# manifest by digest sidesteps the index resolution. Keep this digest in sync
# with `nre_image` in pai-nurec.yaml. Refresh with:
#   docker manifest inspect nvcr.io/nvidia/nre/nre-ga:latest | python3 -c \
#     "import sys,json;d=json.load(sys.stdin);print(next(m['digest'] for m in d['manifests'] if m['platform']['architecture']=='amd64' and m['platform']['os']=='linux'))"
nre_image: "nvcr.io/nvidia/nre/nre-ga@sha256:6e0caa70a9148490552520c3dde9ee665c8d094ca10b814601cb8bb306567c90"
