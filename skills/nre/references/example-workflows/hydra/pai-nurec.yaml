# @package _global_
# End-to-end NuRec reconstruction workflow for the NVIDIA Physical AI
# Autonomous Vehicles (PAI) dataset, starting from a pre-converted NCore V4
# shard. Mirrors `waymo-nurec.yaml` but targets PAI clip ids and the public
# `nvcr.io/nvidia/nre/nre-ga` GA container.
#
# Inputs (consumes the output of `pai-to-ncore`):
#   {ncore_dataset_dir}/{ncore_dataset_name}.json
#   {ncore_dataset_dir}/{ncore_dataset_name}.ncore4.zarr.itar
#
# Outputs (under {nurec_output_dir}/{run_id}/):
#   - usd_out/volume_raw.usdz       (volume-based reconstruction)
#   - usd_out/particle_raw.usdz     (GeomPoints, optional)
#   - val/metrics.yaml              (validation metrics)
#   - gaussian_plys/                (3DGRT-format Gaussians, optional)
#
# Example:
#   ./run.sh --workflow pai-nurec
#   ./run.sh --workflow pai-nurec pai_clip_id="<your-uuid>"
#
# Render the resulting USDZ with `./run.sh --workflow render-pai-nurec`.
defaults:
  - /paths           # paths
  - /personal        # credentials and secrets
  - /tools           # ngc cli, docker, etc.
  - nurec-steps      # shared NuRec / docker steps
  - pai-steps        # PAI-specific defaults (clip id, sensors, etc.)
  - _self_

# steps to use in this workflow
steps:
  - ${remove_output}
  - ${install_ngc_cli}
  - ${ngc_login}
  - ${generate_aux_data}
  - ${training}
  - ${export_usdz_artifact}
  - ${export_gaussian_plys}
  - ${check_val_metrics}

# ---------------------------------------------------------------------------
# Dataset wiring (matches the layout produced by `pai-to-ncore`).
# ---------------------------------------------------------------------------
input_dataset_name: "pai_{pai_clip_id}"
ncore_dataset_name: "{input_dataset_name}"

# ---------------------------------------------------------------------------
# PAI-scoped override of the shared `remove_output` step (nurec-steps.yaml).
#
# The shared step wipes the entire {output_dir}, but for PAI the NCore V4 input
# shard ({ncore_dataset_dir}/{ncore_dataset_name}.json + .ncore4.zarr.itar) is
# produced by the SEPARATE `pai-to-ncore` workflow and lives in the sibling
# {output_dir}/ncore directory. Wiping {output_dir} therefore deletes the input
# that `generate_aux_data`/`training` need, so here we clean only the NuRec
# reconstruction output. (waymo-nurec/robotics-nurec keep the full wipe because
# they regenerate their NCore data in-workflow.)
remove_output:
  name: remove_output
  command: bash
  args:
    - -c
    - |
        mkdir -p {nurec_output_dir}
        docker run --rm -v "{nurec_output_dir}:/out" alpine sh -c 'rm -rf /out/*'

# ---------------------------------------------------------------------------
# NRE config overrides for PAI. Loaded as `external_overrides.yaml` inside
# the NRE GA container.
# ---------------------------------------------------------------------------
nre_config_name: "{config_dir}/nre-overrides/pai.yaml"

# ---------------------------------------------------------------------------
# NRE GA images (publicly hosted on NGC). NGC login is still required so
# `docker pull` can fetch them — `ngc_api_key` lives in personal.yaml.
#
# Pinned to the linux/amd64 image-manifest digest on purpose (NOT the `:latest`
# tag). The GA images are multi-arch OCI indexes that also ship a buildx
# attestation manifest (platform unknown/unknown); some docker/runner versions
# fail to resolve that index against nvcr.io and abort `docker run` with
# `error from registry: Incorrect Repository Format` *after* pulling every
# layer. Referencing the amd64 manifest by digest makes docker pull the
# single-arch image directly and skips the index resolution that triggers it.
#
# Refresh after a GA release (re-resolves `:latest` -> amd64 digest):
#   docker manifest inspect nvcr.io/nvidia/nre/nre-ga:latest | python3 -c \
#     "import sys,json;d=json.load(sys.stdin);print(next(m['digest'] for m in d['manifests'] if m['platform']['architecture']=='amd64' and m['platform']['os']=='linux'))"
# ---------------------------------------------------------------------------
nre_image: "nvcr.io/nvidia/nre/nre-ga@sha256:6e0caa70a9148490552520c3dde9ee665c8d094ca10b814601cb8bb306567c90"
nre_tools_image: "nvcr.io/nvidia/nre/nre-tools-ga@sha256:46d78256219a6541601fd16517c7edca3e7a6ec9634f1858f7977279bd98f9ff"

# Path to the configs/ directory on the entrypoint's Hydra search path inside
# the pinned nre-ga image. The GA entrypoint re-execs into the `pycena` runtime,
# whose runfiles hold the active config search path. This path is tied to the
# `nre_image` digest above; re-verify it when bumping the digest:
#   docker run --rm -e NVIDIA_VISIBLE_DEVICES=void --entrypoint bash {nre_image} \
#     -c 'find /app -name car2sim_6cam.yaml'
nre_config_dir: "/app/internal/scripts/pycena/runtime/pycena_nrm_full.runfiles/_main/configs"

# Default camera used for any rendering invoked from this workflow (must
# be one of `pai_camera_ids`).
camera_to_render: "camera_front_wide_120fov"

# USDZ export type: "standard" (volume-based), "geompoints" (GeomPoints), or
# "both". Patching steps from `nurec-steps.yaml` are intentionally NOT
# wired in by default — they require the internal `real2sim` image. The
# render workflow consumes `volume_raw.usdz` directly.
export_usdz_type: "both"

# Validation thresholds: training fails the `check_val_metrics` step when
# `test/psnr` < min or `test/elapsed_time_s` > max.
min_test_psnr: 22.0
max_test_elapsed_time_s: 1800.0
