# ---------------------------------------------------------------------------
# Shared steps for NVIDIA Physical AI Autonomous Vehicles (PAI) workflows.
#
# These steps drive the upstream `nvidia/ncore` repo's bazel-built tools to
# download a single clip from the HuggingFace `nvidia/PhysicalAI-Autonomous-
# Vehicles` dataset, convert it to NCore V4, and render a NuRec reconstruction.
#
# References:
#   - https://huggingface.co/datasets/nvidia/PhysicalAI-Autonomous-Vehicles
#   - https://nvidia.github.io/ncore/conversions/pai/pai.html
#   - https://github.com/NVIDIA/ncore
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# default variables (can be overridden by individual workflow configs / CLI)
# ---------------------------------------------------------------------------

# Upstream NCore repo (provides the `pai-clip-dl` and `pai:convert` tools).
ncore_repo: "https://github.com/NVIDIA/ncore.git"
ncore_ref: "main"
ncore_clone_dir: "{dependencies_dir}/ncore"

# A clip UUID from `nvidia/PhysicalAI-Autonomous-Vehicles` on HuggingFace.
# Override via CLI: `pai_clip_id="<your-uuid>"`.
# NuRec / NCore tooling is only validated for `platform_class == 'hyperion_8.1'`
# clips; verify with the dataset metadata before swapping this value.
pai_clip_id: "25cd4769-5dcf-4b53-a351-bf2c5deb6124"

# Where the raw HuggingFace clip lands on disk. `pai-clip-dl` writes one
# subdirectory per clip: {pai_dataset_dir}/{pai_clip_id}/{calibration,labels,
# camera,lidar,metadata}.
pai_dataset_dir: "{input_dir}/av-datasets/pai"

# Sensor selection for the Hyperion-8.1 car2sim reconstruction config: six
# cameras plus the top lidar, all exported into the NCore shard for training.
pai_camera_ids: "camera_front_wide_120fov camera_front_tele_30fov camera_cross_right_120fov camera_cross_left_120fov camera_rear_left_70fov camera_rear_right_70fov"
pai_lidar_ids: "lidar_top_360fov"
pai_no_lidars: "false"

# Optional clip slicing for the `pai-v4` converter. Empty strings mean no
# slicing (use the full 20s clip).
pai_seek_sec: ""
pai_duration_sec: ""

# NCore V4 store layout. NuRec wants `separate-sensors` + `itar`.
pai_store_type: "itar"
pai_profile: "separate-sensors"

# HuggingFace token used by `pai-clip-dl` (sourced from personal.yaml).
hf_token: "{huggingface_token}"

# ---------------------------------------------------------------------------
# steps
# ---------------------------------------------------------------------------

# Make sure the directory we land the raw HuggingFace clip in exists.
ensure_pai_dataset_dir:
  name: ensure_pai_dataset_dir
  command: bash
  args:
    - -c
    - |
      mkdir -p {pai_dataset_dir}

# ---------------------------------------------------------------------------
# Clone the upstream NCore repository (idempotent). The same checkout is
# reused by both the download step (`pai-clip-dl`) and the conversion step
# (`pai:convert`); bazel's local cache means the second run reuses the first
# build's output.
clone_ncore_repo:
  name: clone_ncore_repo
  command: bash
  args:
    - -c
    - |
      set -euo pipefail
      mkdir -p {dependencies_dir}
      if [ ! -d "{ncore_clone_dir}/.git" ]; then
        echo "[INFO] Cloning {ncore_repo}@{ncore_ref} to {ncore_clone_dir}"
        rm -rf "{ncore_clone_dir}"
        git clone --depth 1 --branch {ncore_ref} {ncore_repo} {ncore_clone_dir}
      else
        echo "[INFO] NCore repo already at {ncore_clone_dir}; pulling latest {ncore_ref}"
        git -C {ncore_clone_dir} fetch --depth 1 origin {ncore_ref}
        git -C {ncore_clone_dir} checkout {ncore_ref}
        git -C {ncore_clone_dir} reset --hard origin/{ncore_ref}
      fi
      # ncore pins rules_python, whose hermetic Python toolchain hard-fails
      # with "The current user is root, please run as non-root..." when bazel
      # runs as root. CI runs the whole pipeline as root inside python:3.12-slim,
      # so tell ncore's python toolchain (it is the bazel root module, the only
      # place rules_python honors this) to tolerate root. No-op for non-root
      # local runs. Re-applied every run because the git reset --hard above
      # reverts the edit on existing checkouts.
      if ! grep -q "ignore_root_user_error" "{ncore_clone_dir}/MODULE.bazel"; then
        echo "[INFO] Patching ncore MODULE.bazel: ignore_root_user_error = True (allow bazel under root)"
        sed -i 's/^python\.toolchain(/python.toolchain(\n    ignore_root_user_error = True,/' "{ncore_clone_dir}/MODULE.bazel"
      fi

# ---------------------------------------------------------------------------
# Download a single PAI clip from HuggingFace using the bazel-built
# `pai-clip-dl` tool. This produces the directory layout that the local
# (`pai-v4`) NCore converter consumes:
#   {pai_dataset_dir}/{pai_clip_id}/{calibration,labels,camera,lidar,metadata}/
#
# Requires `huggingface_token` in personal.yaml *and* prior acceptance of
# the NVIDIA AV Dataset License Agreement on the HuggingFace dataset page.
download_pai_clip:
  name: download_pai_clip
  command: bash
  args:
    - -c
    - |
      set -euo pipefail
      if [ -z "{hf_token}" ]; then
        echo "[ERROR] huggingface_token is empty in personal.yaml. Add a HuggingFace user access token and accept the dataset license at https://huggingface.co/datasets/nvidia/PhysicalAI-Autonomous-Vehicles."
        exit 1
      fi
      export HF_TOKEN="{hf_token}"
      mkdir -p {pai_dataset_dir}
      cd {ncore_clone_dir}
      echo "[INFO] Downloading PAI clip {pai_clip_id} -> {pai_dataset_dir}/{pai_clip_id}"
      bazel run \
        //tools/data_converter/pai/pai_remote:pai-clip-dl \
        -- \
        download {pai_clip_id} \
        --output-dir {pai_dataset_dir}

# ---------------------------------------------------------------------------
# Convert a previously-downloaded PAI clip to NCore V4 using the bazel-built
# `pai:convert` tool with the `pai-v4` subcommand.
#
# Output: {ncore_out_dir}/pai_{pai_clip_id}/pai_{pai_clip_id}.ncore4.zarr.itar
#         + sequence-meta JSON (`--sequence-meta` is on by default; NRE/aux
#         data steps consume it directly so a separate `generate_dataset_manifest`
#         step is not required for PAI).
run_pai_to_ncore:
  name: run_pai_to_ncore
  command: bash
  args:
    - -c
    - |
      set -euxo pipefail
      mkdir -p {ncore_out_dir}
      cd {ncore_clone_dir}

      EXTRA_ARGS=""
      for cam in {pai_camera_ids}; do
        EXTRA_ARGS="$EXTRA_ARGS --camera-id $cam"
      done
      if [ "{pai_no_lidars}" = "true" ]; then
        EXTRA_ARGS="$EXTRA_ARGS --no-lidars"
      fi

      SUB_ARGS=""
      if [ -n "{pai_seek_sec}" ]; then
        SUB_ARGS="$SUB_ARGS --seek-sec {pai_seek_sec}"
      fi
      if [ -n "{pai_duration_sec}" ]; then
        SUB_ARGS="$SUB_ARGS --duration-sec {pai_duration_sec}"
      fi

      bazel run \
        //tools/data_converter/pai:convert \
        -- \
        --root-dir {pai_dataset_dir} \
        --output-dir {ncore_out_dir} \
        $EXTRA_ARGS \
        pai-v4 \
        --store-type {pai_store_type} \
        --profile {pai_profile} \
        --sequence-meta \
        $SUB_ARGS

      echo "[INFO] Conversion done. NCore shard contents:"
      ls -lah {ncore_dataset_dir}

# ---------------------------------------------------------------------------
# Render a PAI NuRec USDZ that the training step produced. Uses the raw
# (unpatched) volume USDZ so the public NRE GA image is sufficient — no
# dependency on the internal `real2sim` patcher image.
#
# Override `pai_render_usdz` to render an arbitrary USDZ instead of the
# fresh training output. Override `camera_to_render` to pick a different
# PAI camera.
render_pai_usdz:
  name: render_pai_usdz
  command: docker
  image: "{nre_image}"
  args:
    - run
    - "--shm-size={shm_size}"
    - -it
    - --name render-pai-usdz
    - --rm
    - --gpus all
    - --volume "{nurec_output_dir}:/workdir/output"
    - "{image}"
    - render
    - "--artifact-path={pai_render_usdz}"
    - "--output-dir=/workdir/output/{run_id}/render_out"
    - "--image-format=png"
    - "--camera-id={camera_to_render}"
    - "--height={render_height}"
    - "--frame-step=1"
    - "--frame-naming=frame-end-timestamp"
    - "--replicate-training-views"
