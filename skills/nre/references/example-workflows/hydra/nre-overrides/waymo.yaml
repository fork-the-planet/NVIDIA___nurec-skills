# Specify the NuRec config to use and its overrides
defaults:
  - /apps/AV/Waymo/3dgut_dynamic.yaml
  - /apps/AV/module_mixins/_calib_mixin.yaml
  - override /model/calib: free_pose
  - _self_

dataset:
  n_samples_per_epoch: 30000

# Increase max gaussians to 4M
# model:
#   strategy:
#     add:
#       max_n_gaussians: 2000000 # Maximum number of Gaussians
#       end_iteration: 25000

#     relocate:
#       end_iteration: 25000

trainer:
  max_epochs: 1

system:
  gaussians:
    metrics:
      cpsnr:
        enabled: true
        classes: null  # If specified, only compute cpsnr for these classes, else for all classes
      ssim:
        enabled: true
      lpips:
        enabled: true

checkpoint:
  artifact:
    enabled: true
    checkpoint:
      enabled: true
    nrend:
      enabled: true
    parsed_config:
      enabled: true
    rig_trajectories:
      enabled: true
    sequence_tracks:
      enabled: true