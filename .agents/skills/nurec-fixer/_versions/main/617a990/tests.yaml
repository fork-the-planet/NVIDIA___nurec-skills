slug: nurec-fixer
items:
- id: nurec-fixer.001
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: 'I have a directory of PNG frames rendered from a NuRec reconstruction

    and I want to run NVIDIA Fixer on them to remove artifacts. What

    container image do I use, and where do I get the pretrained weights?

    '
  timeout_seconds: 90
  expected_signals:
  - nvcr.io/nvidia/cosmos/cosmos-predict2-container:1.2
  - nvidia/Fixer
  - huggingface
  expected_signals_any:
  - HF_TOKEN
  - huggingface-cli
  forbidden_signals:
  - gitlab-master.nvidia.com
  - :latest
  judge_rubric:
  - The response names the public NGC cosmos-predict2-container pinned to tag 1.2, not :latest and not
    an internal mirror.
  - The response fetches the pretrained weights from the public nvidia/Fixer HuggingFace repo.
  - The response does not leak internal NVIDIA hostnames or internal source repos.
- id: nurec-fixer.002
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: 'Walk me through the end-to-end workflow for running Fixer on rendered

    frames: what are the steps in order, from a clean host to enhanced

    output images?

    '
  timeout_seconds: 150
  expected_signals:
  - HF_TOKEN
  - huggingface-cli download
  - docker run
  - pretrained_fixer.pkl
  expected_ordering:
  - HF_TOKEN
  - huggingface-cli download
  - docker run
  forbidden_signals:
  - gitlab-master.nvidia.com
  judge_rubric:
  - The workflow validates prerequisites / pulls the container before downloading weights.
  - Weight download precedes the inference docker run.
  - The response explicitly mounts the weights, input, and output directories when running the container.
- id: nurec-fixer.003
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: 'Give me the exact docker run command to run Fixer inference on a

    directory of rendered frames at /data/renders, writing enhanced

    frames to /data/enhanced, with weights under ./models.

    '
  timeout_seconds: 120
  expected_signals:
  - docker run
  - --gpus
  - pretrained_fixer.pkl
  - inference_pretrained_model.py
  - nvcr.io/nvidia/cosmos/cosmos-predict2-container:1.2
  expected_signals_any:
  - --timestep 250
  - --timestep=250
  - timestep 250
  forbidden_signals:
  - gitlab-master.nvidia.com
  - torchrun
  - --nproc_per_node
  judge_rubric:
  - The command mounts the weights directory (read-only is acceptable) and points --model at the in-container
    path.
  - The command mounts both input and output directories into the container.
  - The command does not use torchrun or multi-process launch for Fixer inference.
- id: nurec-fixer.004
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: 'I''m already running an NRE reconstruction pipeline. Do I need to run

    Fixer manually as a separate docker run, or is there a simpler way to

    enable it as part of NRE?

    '
  timeout_seconds: 90
  expected_signals:
  - --enable-difix
  - --difix-cache
  forbidden_signals:
  - gitlab-master.nvidia.com
  judge_rubric:
  - The response recommends --enable-difix with a cache directory rather than running Fixer manually.
  - The response notes that NRE will download the weights into the cache on first run.
  - The response does not require the user to also run the standalone docker inference command in this
    path.
- id: nurec-fixer.005
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: 'What GPUs are supported for running the pretrained Fixer model, and

    roughly how much VRAM do I need at the default resolution?

    '
  timeout_seconds: 60
  expected_signals:
  - Ampere
  expected_signals_any:
  - compute capability
  - sm_80
  - '8.0'
  forbidden_signals:
  - gitlab-master.nvidia.com
  - Turing
  - Volta
  judge_rubric:
  - The response states Ampere or newer (compute capability >= 8.0) is required.
  - The response mentions ~16 GB VRAM (or a comparable figure) for the pretrained Fixer at 1024x576.
  - The response does not claim pre-Ampere GPUs (Turing, Volta, Pascal) are supported.
- id: nurec-fixer.006
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: 'How do I set up a paired test dataset to evaluate Fixer with PSNR and

    LPIPS, and how do I run the evaluation? What output does it produce?

    '
  timeout_seconds: 120
  expected_signals:
  - render
  - gt
  - evaluate_test_dataset.py
  - metrics.yaml
  expected_signals_any:
  - PSNR
  - psnr
  forbidden_signals:
  - gitlab-master.nvidia.com
  judge_rubric:
  - The response describes the per-scene render/ and gt/ subtree layout with matching filenames.
  - The response invokes evaluate_test_dataset.py inside the cosmos-predict2 container.
  - The response mentions metrics.yaml as the output with PSNR and LPIPS.
- id: nurec-fixer.007
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: 'My previous Fixer run failed partway through and left some files in

    the output directory. Can I just re-run pointing at the same output

    directory, or do I need to do something different?

    '
  timeout_seconds: 150
  expected_signals:
  - empty
  forbidden_signals:
  - gitlab-master.nvidia.com
  judge_rubric:
  - The response warns that the output directory must be empty or non-existent before re-running.
  - The response explains that stale outputs degrade temporal coherence / quality because the harmonizer
    uses prior outputs as reference.
  - The response tells the user to clear the output directory (or pick a new one) rather than overwriting
    in place.
- id: nurec-fixer.008
  category: single-tool
  tools_required:
  - nurec-fixer
  user_prompt: 'My frames are named frame_1.png, frame_2.png, ..., frame_10.png,

    frame_11.png. Is this going to cause any issues with Fixer?

    '
  timeout_seconds: 60
  expected_signals_any:
  - natural-sort
  - natural sort
  - zero-pad
  - zero pad
  - fixed-width
  - fixed width
  forbidden_signals:
  - gitlab-master.nvidia.com
  judge_rubric:
  - The response identifies that non-zero-padded filenames misorder under natural sort (frame_10 sorts
    before frame_2).
  - The response recommends zero-padded, fixed-width indices (e.g. frame_0001.png) to get correct temporal
    order.
- id: nurec-fixer.009
  category: cross-tool
  tools_required:
  - nurec-fixer
  - cosmos-predict
  user_prompt: 'I want to generate a Video2World clip with Cosmos-Predict2.5 and then

    post-process the rendered frames with NVIDIA Fixer. Do these two

    tools share a container image, and what HuggingFace credential do I

    need for each?

    '
  timeout_seconds: 180
  expected_signals:
  - HF_TOKEN
  - nvidia/Fixer
  expected_signals_any:
  - cosmos-predict2-container
  - Cosmos-Predict2.5
  - Cosmos-Guardrail1
  forbidden_signals:
  - gitlab-master.nvidia.com
  judge_rubric:
  - The response correctly identifies that Fixer uses the public nvcr.io/nvidia/cosmos/cosmos-predict2-container:1.2
    image.
  - The response notes Cosmos-Predict2.5 requires accepting the NVIDIA Open Model License on HuggingFace
    (Cosmos-Guardrail1).
  - The response explains that a single HF_TOKEN with Read scope serves both, as long as the relevant
    model licenses are accepted.
